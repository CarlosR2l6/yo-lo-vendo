<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chats | Yo Lo Vendo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark: #0b3d2e;
      --green-mid: #1fbf75;
      --green-light: #34d399;
      --yellow: #e6d44c;
      --yellow-dark: #7a6a00;
      --card-bg: rgba(255,255,255,0.06);
      --card-border: rgba(52,211,153,0.2);
      --text-main: #eafff5;
      --text-muted: #9fffd8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: radial-gradient(ellipse at top left, #1a5c3a, #0b3d2e 50%, #071f17);
      min-height: 100vh;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* NAVBAR */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(11,61,46,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--card-border);
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; gap: 16px;
      flex-shrink: 0;
    }
    .nav-logo {
      font-family: 'Poppins', sans-serif;
      font-size: 22px; font-weight: 900; text-decoration: none;
    }
    .nav-logo .yo { color: #fff; }
    .nav-logo .lo { color: #fff; font-weight: 400; }
    .nav-logo .vendo { color: var(--yellow); text-shadow: 0 2px 0 var(--yellow-dark); }
    .nav-title {
      font-family: 'Poppins', sans-serif;
      font-size: 16px; font-weight: 800;
      margin-left: 8px;
    }
    .nav-back {
      margin-left: auto;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--card-border);
      color: var(--text-muted); padding: 8px 16px;
      border-radius: 50px; font-family: 'Nunito', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer;
      text-decoration: none; display: flex; align-items: center; gap: 6px;
    }

    /* LAYOUT DOS COLUMNAS */
    .chat-layout {
      display: flex;
      flex: 1;
      height: calc(100vh - 64px);
      overflow: hidden;
    }

    /* LISTA DE CHATS */
    .chat-list {
      width: 320px;
      flex-shrink: 0;
      border-right: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-list-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--card-border);
      font-family: 'Poppins', sans-serif;
      font-size: 15px; font-weight: 700;
    }

    .chat-search {
      padding: 12px 16px;
      border-bottom: 1px solid var(--card-border);
      position: relative;
    }
    .chat-search input {
      width: 100%; padding: 9px 14px 9px 36px;
      border-radius: 50px;
      border: 1.5px solid var(--card-border);
      background: rgba(255,255,255,0.06);
      color: var(--text-main); font-family: 'Nunito', sans-serif;
      font-size: 13px; outline: none; transition: border-color 0.2s;
    }
    .chat-search input:focus { border-color: var(--green-light); }
    .chat-search input::placeholder { color: var(--text-muted); }
    .chat-search .sicon {
      position: absolute; left: 28px; top: 50%;
      transform: translateY(-50%); font-size: 14px; opacity: 0.5;
    }

    .chat-items { overflow-y: auto; flex: 1; scrollbar-width: thin; scrollbar-color: var(--card-border) transparent; }

    .chat-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; cursor: pointer;
      border-bottom: 1px solid rgba(52,211,153,0.08);
      transition: background 0.2s;
      animation: fadeUp 0.3s ease both;
    }
    .chat-item:hover { background: rgba(255,255,255,0.04); }
    .chat-item.active { background: rgba(52,211,153,0.1); border-left: 3px solid var(--green-light); }

    .chat-avatar {
      width: 46px; height: 46px; border-radius: 50%;
      background: linear-gradient(135deg, var(--green-light), var(--yellow));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Poppins', sans-serif;
      font-size: 18px; font-weight: 900; color: #063521;
      flex-shrink: 0; position: relative;
    }
    .online-dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 11px; height: 11px; border-radius: 50%;
      background: var(--green-light);
      border: 2px solid #0b3d2e;
    }
    .chat-item-info { flex: 1; min-width: 0; }
    .chat-item-top {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 3px;
    }
    .chat-item-name { font-weight: 700; font-size: 14px; }
    .chat-item-time { font-size: 11px; color: var(--text-muted); }
    .chat-item-preview {
      font-size: 12px; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-item-product {
      font-size: 11px; color: var(--green-light);
      margin-top: 2px;
    }
    .unread-badge {
      background: var(--green-mid); color: #063521;
      font-size: 11px; font-weight: 800;
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* VENTANA DE CHAT */
    .chat-window {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }

    .chat-window-header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--card-border);
      display: flex; align-items: center; gap: 14px;
      background: rgba(11,61,46,0.5);
      flex-shrink: 0;
    }
    .chat-window-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, var(--green-light), var(--yellow));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Poppins', sans-serif;
      font-size: 17px; font-weight: 900; color: #063521;
    }
    .chat-window-info { flex: 1; }
    .chat-window-name {
      font-family: 'Poppins', sans-serif;
      font-size: 15px; font-weight: 800;
    }
    .chat-window-status { font-size: 12px; color: var(--green-light); margin-top: 1px; }
    .chat-product-chip {
      background: rgba(52,211,153,0.1);
      border: 1px solid var(--card-border);
      border-radius: 50px; padding: 6px 14px;
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; gap: 6px;
      cursor: pointer; transition: border-color 0.2s;
    }
    .chat-product-chip:hover { border-color: var(--green-light); }

    /* MENSAJES */
    .messages-wrap {
      flex: 1; overflow-y: auto; padding: 20px 24px;
      display: flex; flex-direction: column; gap: 12px;
      scrollbar-width: thin; scrollbar-color: var(--card-border) transparent;
    }

    .msg-date-label {
      text-align: center; font-size: 11px;
      color: var(--text-muted); margin: 8px 0;
    }

    .msg-row {
      display: flex; gap: 8px;
      animation: fadeUp 0.2s ease both;
    }
    .msg-row.mine { flex-direction: row-reverse; }

    .msg-avatar-sm {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, var(--green-light), var(--yellow));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 900; color: #063521;
      flex-shrink: 0; align-self: flex-end;
    }
    .msg-row.mine .msg-avatar-sm {
      background: linear-gradient(135deg, #2a7a56, #1fbf75);
    }

    .msg-bubble {
      max-width: 65%; padding: 10px 14px;
      border-radius: 18px; font-size: 14px; line-height: 1.5;
      position: relative;
    }
    .msg-row:not(.mine) .msg-bubble {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-bottom-left-radius: 4px;
    }
    .msg-row.mine .msg-bubble {
      background: linear-gradient(135deg, #1a6644, #145233);
      border: 1px solid rgba(52,211,153,0.3);
      border-bottom-right-radius: 4px;
    }
    .msg-time {
      font-size: 10px; color: var(--text-muted);
      margin-top: 4px; text-align: right;
    }
    .msg-row:not(.mine) .msg-time { text-align: left; }

    /* INPUT MENSAJE */
    .chat-input-bar {
      padding: 14px 24px;
      border-top: 1px solid var(--card-border);
      display: flex; gap: 10px; align-items: flex-end;
      background: rgba(11,61,46,0.5);
      flex-shrink: 0;
    }
    .chat-input-bar textarea {
      flex: 1; padding: 11px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--card-border);
      background: rgba(255,255,255,0.07);
      color: var(--text-main); font-family: 'Nunito', sans-serif;
      font-size: 14px; outline: none; resize: none;
      max-height: 100px; transition: border-color 0.2s;
      line-height: 1.4;
    }
    .chat-input-bar textarea:focus { border-color: var(--green-light); }
    .chat-input-bar textarea::placeholder { color: var(--text-muted); }
    .btn-send {
      width: 46px; height: 46px; border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--green-light), var(--green-mid));
      color: #063521; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
    }
    .btn-send:hover { transform: scale(1.1); box-shadow: 0 4px 16px rgba(52,211,153,0.4); }

    /* EMPTY STATE */
    .empty-chat {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-muted); text-align: center; padding: 40px;
    }
    .empty-chat .big { font-size: 64px; margin-bottom: 16px; }
    .empty-chat h3 { font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text-main); }
    .empty-chat p { font-size: 14px; }

    /* BOTTOM NAV */
    .bottom-nav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(11,61,46,0.97);
      border-top: 1px solid var(--card-border);
      backdrop-filter: blur(14px);
      padding: 10px 0 18px; z-index: 100;
    }
    .bnav-inner { display: flex; justify-content: space-around; }
    .bnav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: pointer; color: var(--text-muted);
      font-size: 11px; font-weight: 600; text-decoration: none; transition: color 0.2s;
    }
    .bnav-item.active { color: var(--green-light); }
    .bnav-icon { font-size: 22px; }
    .bnav-publish {
      background: linear-gradient(135deg, var(--green-light), var(--green-mid));
      color: #063521 !important; padding: 10px 22px; border-radius: 50px;
      margin-top: -18px; box-shadow: 0 4px 20px rgba(52,211,153,0.5);
    }

    /* RESPONSIVE MÓVIL */
    @media (max-width: 640px) {
      .chat-list { width: 100%; border-right: none; }
      .chat-window { display: none; }
      .chat-window.mobile-open { display: flex; position: fixed; inset: 0; z-index: 50; background: #0b3d2e; }
      .bottom-nav { display: block; }
      .chat-layout { height: calc(100vh - 64px - 72px); }
      .mobile-back { display: flex !important; }
    }
    .mobile-back {
      display: none;
      background: none; border: none; color: var(--text-muted);
      font-size: 22px; cursor: pointer; padding: 4px;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <a href="home.html" class="nav-logo">
    <span class="yo">YO</span><span class="lo">lo</span><span class="vendo">VENDO</span>
  </a>
  <span class="nav-title">💬 Chats</span>
  <a href="home.html" class="nav-back">← Inicio</a>
</nav>

<div class="chat-layout">

  <!-- LISTA DE CONVERSACIONES -->
  <div class="chat-list" id="chatList">
    <div class="chat-list-header">Conversaciones</div>
    <div class="chat-search">
      <span class="sicon">🔍</span>
      <input type="text" placeholder="Buscar conversación..." oninput="filterChats(this.value)">
    </div>
    <div class="chat-items" id="chatItems"></div>
  </div>

  <!-- VENTANA DE CHAT -->
  <div class="chat-window" id="chatWindow">
    <!-- Se llena con JS -->
    <div class="empty-chat" id="emptyChatState">
      <div class="big">💬</div>
      <h3>Selecciona una conversación</h3>
      <p>Elige un chat de la lista para empezar a hablar.</p>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="bnav-inner">
    <a href="home.html" class="bnav-item"><span class="bnav-icon">🏠</span><span>Inicio</span></a>
    <a href="home.html" class="bnav-item"><span class="bnav-icon">🔍</span><span>Buscar</span></a>
    <a href="home.html" class="bnav-item bnav-publish"><span class="bnav-icon">＋</span><span>Publicar</span></a>
    <a href="chat.html" class="bnav-item active"><span class="bnav-icon">💬</span><span>Chats</span></a>
    <a href="profile.html" class="bnav-item"><span class="bnav-icon">👤</span><span>Perfil</span></a>
  </div>
</div>

<script>
  // ===== DATOS DE CHATS =====
  const chats = [
    {
      id: 1,
      nombre: 'Carlos M.',
      inicial: 'C',
      online: true,
      producto: '💻 Laptop HP 15"',
      unread: 2,
      mensajes: [
        { de: 'ellos', texto: 'Hola! Sigue disponible la laptop?', hora: '10:30' },
        { de: 'yo',    texto: 'Sí, está disponible. ¿Te interesa verla?', hora: '10:32' },
        { de: 'ellos', texto: 'Sí me interesa mucho. ¿Cuánto es lo mínimo que aceptas?', hora: '10:35' },
        { de: 'yo',    texto: 'Podría dejártela en $800.000 si la pagas hoy', hora: '10:36' },
        { de: 'ellos', texto: 'Me parece bien! ¿Podemos vernos mañana en el INTEP?', hora: '10:40' },
        { de: 'ellos', texto: '¿A qué hora te queda bien?', hora: '10:40' },
      ]
    },
    {
      id: 2,
      nombre: 'Laura P.',
      inicial: 'L',
      online: false,
      producto: '🎧 Audífonos Sony',
      unread: 0,
      mensajes: [
        { de: 'yo',    texto: 'Hola! Vi tus audífonos, ¿hacemos trueque por mi calculadora?', hora: 'Ayer' },
        { de: 'ellos', texto: 'Hola! Qué calculadora tienes?', hora: 'Ayer' },
        { de: 'yo',    texto: 'Una Casio fx-991EX casi nueva', hora: 'Ayer' },
        { de: 'ellos', texto: 'Mmm déjame pensarlo y te aviso 😊', hora: 'Ayer' },
      ]
    },
    {
      id: 3,
      nombre: 'Miguel R.',
      inicial: 'M',
      online: true,
      producto: '📚 Cálculo Integral',
      unread: 1,
      mensajes: [
        { de: 'ellos', texto: 'Buenas! Tienes libros de física para hacer trueque?', hora: '09:10' },
        { de: 'yo',    texto: 'Tengo Serway edición 9, ¿te sirve?', hora: '09:15' },
        { de: 'ellos', texto: 'Perfecto! Hagamos el cambio', hora: '09:20' },
      ]
    },
    {
      id: 4,
      nombre: 'Sofía G.',
      inicial: 'S',
      online: false,
      producto: '🎮 Control PS5',
      unread: 0,
      mensajes: [
        { de: 'yo',    texto: '¿El control tiene los joysticks en buen estado?', hora: 'Lun' },
        { de: 'ellos', texto: 'Sí, sin desgaste. Te mando fotos si quieres', hora: 'Lun' },
        { de: 'yo',    texto: 'Perfecto, mándame!', hora: 'Lun' },
      ]
    },
  ];

  let chatActivo = null;

  // ===== RENDER LISTA =====
  function renderChatList(lista) {
    const container = document.getElementById('chatItems');
    container.innerHTML = '';
    lista.forEach((chat, i) => {
      const ultimo = chat.mensajes[chat.mensajes.length - 1];
      const div = document.createElement('div');
      div.className = 'chat-item' + (chatActivo?.id === chat.id ? ' active' : '');
      div.style.animationDelay = `${i * 0.05}s`;
      div.onclick = () => abrirChat(chat.id);
      div.innerHTML = `
        <div class="chat-avatar">
          ${chat.inicial}
          ${chat.online ? '<div class="online-dot"></div>' : ''}
        </div>
        <div class="chat-item-info">
          <div class="chat-item-top">
            <span class="chat-item-name">${chat.nombre}</span>
            <span class="chat-item-time">${ultimo.hora}</span>
          </div>
          <div class="chat-item-preview">${ultimo.de === 'yo' ? 'Tú: ' : ''}${ultimo.texto}</div>
          <div class="chat-item-product">${chat.producto}</div>
        </div>
        ${chat.unread > 0 ? `<div class="unread-badge">${chat.unread}</div>` : ''}
      `;
      container.appendChild(div);
    });
  }

  // ===== ABRIR CHAT =====
  function abrirChat(id) {
    chatActivo = chats.find(c => c.id === id);
    chatActivo.unread = 0;
    renderChatList(chats);

    const win = document.getElementById('chatWindow');
    win.innerHTML = `
      <div class="chat-window-header">
        <button class="mobile-back" onclick="cerrarChatMobile()">←</button>
        <div class="chat-window-avatar">${chatActivo.inicial}</div>
        <div class="chat-window-info">
          <div class="chat-window-name">${chatActivo.nombre}</div>
          <div class="chat-window-status">${chatActivo.online ? '🟢 En línea' : '⚫ Desconectado'}</div>
        </div>
        <div class="chat-product-chip" onclick="window.location.href='product-detail.html'">
          ${chatActivo.producto} ↗
        </div>
      </div>

      <div class="messages-wrap" id="messagesWrap">
        <div class="msg-date-label">Hoy</div>
        ${chatActivo.mensajes.map(m => `
          <div class="msg-row ${m.de === 'yo' ? 'mine' : ''}">
            <div class="msg-avatar-sm">${m.de === 'yo' ? 'E' : chatActivo.inicial}</div>
            <div>
              <div class="msg-bubble">${m.texto}</div>
              <div class="msg-time">${m.hora}</div>
            </div>
          </div>
        `).join('')}
      </div>

      <div class="chat-input-bar">
        <textarea id="msgInput" placeholder="Escribe un mensaje..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" onclick="enviarMensaje()">➤</button>
      </div>
    `;

    // Mobile: abrir ventana
    win.classList.add('mobile-open');
    scrollBottom();
  }

  // ===== ENVIAR MENSAJE =====
  function enviarMensaje() {
    const input = document.getElementById('msgInput');
    const texto = input.value.trim();
    if (!texto || !chatActivo) return;

    const hora = new Date().toLocaleTimeString('es-CO', { hour:'2-digit', minute:'2-digit' });
    chatActivo.mensajes.push({ de: 'yo', texto, hora });

    const wrap = document.getElementById('messagesWrap');
    const div = document.createElement('div');
    div.className = 'msg-row mine';
    div.innerHTML = `
      <div class="msg-avatar-sm">E</div>
      <div>
        <div class="msg-bubble">${texto}</div>
        <div class="msg-time">${hora}</div>
      </div>`;
    wrap.appendChild(div);

    input.value = '';
    input.style.height = 'auto';
    scrollBottom();
    renderChatList(chats);

    // Respuesta automática simulada
    setTimeout(() => {
      const respuestas = [
        '¡Perfecto! Te confirmo en un momento 😊',
        'Claro, sin problema!',
        'Buena idea, ¿cuándo quedamos?',
        'Ok! Me parece bien 👍',
        'Déjame verificar y te aviso',
      ];
      const resp = respuestas[Math.floor(Math.random() * respuestas.length)];
      const horaResp = new Date().toLocaleTimeString('es-CO', { hour:'2-digit', minute:'2-digit' });
      chatActivo.mensajes.push({ de: 'ellos', texto: resp, hora: horaResp });

      const div2 = document.createElement('div');
      div2.className = 'msg-row';
      div2.innerHTML = `
        <div class="msg-avatar-sm">${chatActivo.inicial}</div>
        <div>
          <div class="msg-bubble">${resp}</div>
          <div class="msg-time">${horaResp}</div>
        </div>`;
      wrap.appendChild(div2);
      scrollBottom();
      renderChatList(chats);
    }, 1200);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensaje(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function scrollBottom() {
    const wrap = document.getElementById('messagesWrap');
    if (wrap) wrap.scrollTop = wrap.scrollHeight;
  }

  function cerrarChatMobile() {
    document.getElementById('chatWindow').classList.remove('mobile-open');
  }

  function filterChats(query) {
    const filtrados = chats.filter(c =>
      c.nombre.toLowerCase().includes(query.toLowerCase()) ||
      c.producto.toLowerCase().includes(query.toLowerCase())
    );
    renderChatList(filtrados);
  }

  // Init
  renderChatList(chats);
</script>
</body>
</html>
