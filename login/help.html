<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ayuda | Yo Lo Vendo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --green-dark:#0b3d2e; --green-mid:#1fbf75; --green-light:#34d399; --yellow:#e6d44c; --yellow-dark:#7a6a00; --card-bg:rgba(255,255,255,0.06); --card-border:rgba(52,211,153,0.2); --text-main:#eafff5; --text-muted:#9fffd8; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Nunito',sans-serif; background:radial-gradient(ellipse at top left,#1a5c3a,#0b3d2e 50%,#071f17); min-height:100vh; color:var(--text-main); padding-bottom:100px; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    nav { position:sticky;top:0;z-index:100;background:rgba(11,61,46,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--card-border);padding:0 24px;height:64px;display:flex;align-items:center;gap:16px; }
    .nav-logo{font-family:'Poppins',sans-serif;font-size:22px;font-weight:900;text-decoration:none}
    .nav-logo .yo{color:#fff} .nav-logo .lo{color:#fff;font-weight:400} .nav-logo .vendo{color:var(--yellow);text-shadow:0 2px 0 var(--yellow-dark)}
    .nav-back{margin-left:auto;background:rgba(255,255,255,0.08);border:1px solid var(--card-border);color:var(--text-muted);padding:8px 16px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none}
    .page-wrap{max-width:680px;margin:0 auto;padding:28px 24px}
    .page-header{text-align:center;margin-bottom:32px;animation:fadeUp 0.3s ease both}
    .page-header h1{font-family:'Poppins',sans-serif;font-size:26px;font-weight:800;margin-bottom:8px}
    .page-header p{font-size:14px;color:var(--text-muted)}
    .help-search{position:relative;margin-bottom:28px;animation:fadeUp 0.35s ease both}
    .help-search input{width:100%;padding:13px 18px 13px 46px;border-radius:50px;border:1.5px solid var(--card-border);background:rgba(255,255,255,0.08);color:var(--text-main);font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s}
    .help-search input:focus{border-color:var(--green-light)}
    .help-search input::placeholder{color:var(--text-muted)}
    .help-search .icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px;opacity:0.6}
    .section-title{font-family:'Poppins',sans-serif;font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .faq-list{display:flex;flex-direction:column;gap:10px;margin-bottom:32px}
    .faq-item{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;overflow:hidden;animation:fadeUp 0.4s ease both;transition:border-color 0.2s}
    .faq-item:hover{border-color:var(--green-light)}
    .faq-question{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-weight:700;font-size:14px;gap:12px}
    .faq-arrow{font-size:12px;transition:transform 0.3s;flex-shrink:0;color:var(--text-muted)}
    .faq-item.open .faq-arrow{transform:rotate(180deg)}
    .faq-answer{max-height:0;overflow:hidden;transition:max-height 0.35s ease,padding 0.3s}
    .faq-item.open .faq-answer{max-height:300px;padding:0 18px 16px}
    .faq-answer p{font-size:13px;color:var(--text-muted);line-height:1.7}
    .contact-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:28px}
    .contact-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:18px;text-align:center;cursor:pointer;transition:all 0.2s;animation:fadeUp 0.5s ease both}
    .contact-card:hover{border-color:var(--green-light);transform:translateY(-3px)}
    .contact-card .icon{font-size:32px;margin-bottom:10px}
    .contact-card h4{font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px}
    .contact-card p{font-size:12px;color:var(--text-muted)}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(11,61,46,0.97);border-top:1px solid var(--card-border);backdrop-filter:blur(14px);padding:10px 0 18px;z-index:100}
    .bnav-inner{display:flex;justify-content:space-around}
    .bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--text-muted);font-size:11px;font-weight:600;text-decoration:none;transition:color 0.2s}
    .bnav-item.active{color:var(--green-light)}
    .bnav-icon{font-size:22px}
    .bnav-publish{background:linear-gradient(135deg,var(--green-light),var(--green-mid));color:#063521 !important;padding:10px 22px;border-radius:50px;margin-top:-18px;box-shadow:0 4px 20px rgba(52,211,153,0.5)}
  </style>
</head>
<body>
<nav>
  <a href="home.html" class="nav-logo"><span class="yo">YO</span><span class="lo">lo</span><span class="vendo">VENDO</span></a>
  <a href="home.html" class="nav-back">← Inicio</a>
</nav>
<div class="page-wrap">
  <div class="page-header">
    <h1>🆘 Centro de ayuda</h1>
    <p>Encuentra respuestas a tus preguntas más frecuentes</p>
  </div>
  <div class="help-search">
    <span class="icon">🔍</span>
    <input type="text" placeholder="Buscar en la ayuda..." oninput="filtrarFAQ(this.value)">
  </div>
  <div class="section-title">❓ Preguntas frecuentes</div>
  <div class="faq-list" id="faqList"></div>
  <div class="section-title">📞 Contactar soporte</div>
  <div class="contact-cards">
    <div class="contact-card" onclick="window.open('mailto:soporte@intep.edu.co')">
      <div class="icon">📧</div>
      <h4>Correo</h4>
      <p>soporte@intep.edu.co</p>
    </div>
    <div class="contact-card" onclick="window.open('https://wa.me/573001234567')">
      <div class="icon">📱</div>
      <h4>WhatsApp</h4>
      <p>+57 300 123 4567</p>
    </div>
    <div class="contact-card">
      <div class="icon">🕐</div>
      <h4>Horario</h4>
      <p>Lun–Vie 8am–5pm</p>
    </div>
  </div>
</div>
<div class="bottom-nav">
  <div class="bnav-inner">
    <a href="home.html" class="bnav-item"><span class="bnav-icon">🏠</span><span>Inicio</span></a>
    <a href="search.html" class="bnav-item"><span class="bnav-icon">🔍</span><span>Buscar</span></a>
    <a href="home.html" class="bnav-item bnav-publish"><span class="bnav-icon">＋</span><span>Publicar</span></a>
    <a href="chat.html" class="bnav-item"><span class="bnav-icon">💬</span><span>Chats</span></a>
    <a href="profile.html" class="bnav-item"><span class="bnav-icon">👤</span><span>Perfil</span></a>
  </div>
</div>
<script>
  const faqs = [
    { p:'¿Quién puede usar Yo Lo Vendo?', r:'Solo estudiantes activos del INTEP con correo institucional @intep.edu.co verificado.' },
    { p:'¿Cómo publico un producto?', r:'Ve a la página principal y toca el botón "+" o "Publicar". Llena el formulario con nombre, descripción, precio o qué quieres a cambio, y listo.' },
    { p:'¿Qué es un trueque?', r:'Es un intercambio de productos sin dinero. Por ejemplo, cambias tus libros del semestre pasado por los del semestre actual.' },
    { p:'¿Es seguro comprar aquí?', r:'Sí. Todos los usuarios están verificados con correo institucional. Siempre coordina entregas en lugares públicos del campus.' },
    { p:'¿Cómo contacto a un vendedor?', r:'Desde la página del producto puedes escribirle por WhatsApp, correo institucional o chat interno.' },
    { p:'¿Puedo eliminar una publicación?', r:'Sí. Ve a "Mis publicaciones", busca el producto y toca el botón "Eliminar" o "Marcar como vendido".' },
    { p:'¿Cómo cambio mi foto de perfil?', r:'Ve a tu perfil tocando el ícono de usuario, luego toca el avatar y selecciona "Elegir foto" para subir una imagen.' },
    { p:'¿Qué hago si alguien me estafa?', r:'Repórtalo inmediatamente a soporte@intep.edu.co con evidencias. Tomamos muy en serio la seguridad de la comunidad.' },
    { p:'¿Puedo vender cualquier cosa?', r:'No. Está prohibido vender productos ilegales, falsificaciones, contenido adulto o cualquier artículo que viole las normas del INTEP.' },
    { p:'¿La plataforma tiene costo?', r:'No, Yo Lo Vendo es completamente gratuita para todos los estudiantes del INTEP.' },
  ];

  function renderFAQ(lista) {
    const container = document.getElementById('faqList');
    container.innerHTML = '';
    lista.forEach((f, i) => {
      const div = document.createElement('div');
      div.className = 'faq-item';
      div.style.animationDelay = `${i * 0.05}s`;
      div.innerHTML = `
        <div class="faq-question" onclick="toggleFAQ(this)">
          <span>${f.p}</span>
          <span class="faq-arrow">▼</span>
        </div>
        <div class="faq-answer"><p>${f.r}</p></div>`;
      container.appendChild(div);
    });
  }

  function toggleFAQ(btn) {
    const item = btn.parentElement;
    const wasOpen = item.classList.contains('open');
    document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('open'));
    if (!wasOpen) item.classList.add('open');
  }

  function filtrarFAQ(q) {
    const filtradas = faqs.filter(f =>
      f.p.toLowerCase().includes(q.toLowerCase()) ||
      f.r.toLowerCase().includes(q.toLowerCase())
    );
    renderFAQ(filtradas);
  }

  renderFAQ(faqs);
</script>
</body>
</html>
