<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Olvidaste tu contraseña | Yo lo Vendo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="login-container">

    <!-- MARCO DEL TÍTULO -->
    <div class="title-frame">
      <h1>
        <span class="yo">YO</span>
        <span class="lo">lo</span>
        <span class="vendo">VENDO</span>
      </h1>

      <div class="line"></div>

      <p class="slogan">
        Recupera el acceso a tu cuenta
      </p>
    </div>

    <!-- FORMULARIO OLVIDASTE CONTRASEÑA -->
    <div class="login-box">

      <p style="color:#eafff5; font-size:14px; margin-bottom:15px;">
        Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.
      </p>

      <input type="email" id="correo" placeholder="Correo institucional">

      <button onclick="mostrarMensaje()">Enviar enlace</button>
      <p id="mensaje" style="display:none; color:#eafff5; margin-top:20px;">
         Revisa tu correo.
          Te hemos enviado un enlace para restablecer tu contraseña. Si no lo ves, revisa tu carpeta de spam.
        </p>

      <div class="links-single">
        <a href="index.html">
          <button>Volver a iniciar sesión</button>
        </a>
      </div>

    </div>

  </div>
    <script>
       function mostrarMensaje() {
        const correo =
         document.getElementById("correo").value;

            if (correo.trim() === "") {
            alert("Por favor, ingresa tu correo institucional.");
            return;
        }

        document.getElementById("mensaje").style.display = "block";
      }
    </script>
</body>
</html>
