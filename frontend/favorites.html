<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Favoritos | Yo Lo Vendo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --green-dark: #0b3d2e; --green-mid: #1fbf75; --green-light: #34d399;
      --yellow: #e6d44c; --yellow-dark: #7a6a00;
      --card-bg: rgba(255,255,255,0.06); --card-border: rgba(52,211,153,0.2);
      --text-main: #eafff5; --text-muted: #9fffd8; --red: #ff6b6b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: radial-gradient(ellipse at top left, #1a5c3a, #0b3d2e 50%, #071f17); min-height: 100vh; color: var(--text-main); padding-bottom: 100px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    nav { position: sticky; top: 0; z-index: 100; background: rgba(11,61,46,0.92); backdrop-filter: blur(14px); border-bottom: 1px solid var(--card-border); padding: 0 24px; height: 64px; display: flex; align-items: center; gap: 16px; }
    .nav-logo { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 900; text-decoration: none; }
    .nav-logo .yo { color: #fff; } .nav-logo .lo { color: #fff; font-weight: 400; } .nav-logo .vendo { color: var(--yellow); text-shadow: 0 2px 0 var(--yellow-dark); }
    .nav-back { margin-left: auto; background: rgba(255,255,255,0.08); border: 1px solid var(--card-border); color: var(--text-muted); padding: 8px 16px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; }
    .page-wrap { max-width: 700px; margin: 0 auto; padding: 28px 24px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; animation: fadeUp 0.3s ease both; }
    .page-header h1 { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 800; }
    .btn-clear { background: transparent; border: 1px solid rgba(255,107,107,0.3); color: var(--red); padding: 8px 16px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .btn-clear:hover { background: rgba(255,107,107,0.1); }
    .fav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .fav-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s; animation: fadeUp 0.4s ease both; position: relative; }
    .fav-card:hover { transform: translateY(-4px); border-color: var(--green-light); }
    .fav-img { width: 100%; aspect-ratio: 1; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 52px; position: relative; }
    .badge-tipo { position: absolute; top: 10px; left: 10px; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 50px; }
    .badge-venta { background: var(--green-mid); color: #063521; }
    .badge-trueque { background: var(--yellow); color: var(--yellow-dark); }
    .btn-unfav { position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,0.5); border: none; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
    .btn-unfav:hover { transform: scale(1.2); }
    .fav-body { padding: 12px 14px 14px; }
    .fav-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fav-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .fav-footer { display: flex; align-items: center; justify-content: space-between; }
    .fav-price { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 15px; color: var(--green-light); }
    .fav-price.t { color: var(--yellow); font-size: 12px; }
    .btn-contact { background: rgba(52,211,153,0.15); border: 1px solid var(--green-light); color: var(--green-light); font-size: 11px; font-weight: 700; padding: 5px 11px; border-radius: 50px; cursor: pointer; transition: background 0.2s; }
    .btn-contact:hover { background: var(--green-light); color: #063521; }
    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 700; color: var(--text-main); margin-bottom: 10px; }
    .empty-state p { font-size: 14px; margin-bottom: 24px; }
    .btn-explorar { background: linear-gradient(135deg, var(--green-light), var(--green-mid)); color: #063521; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 14px; padding: 12px 28px; border-radius: 50px; border: none; cursor: pointer; }
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--green-mid); color: #063521; font-weight: 700; font-size: 14px; padding: 12px 24px; border-radius: 50px; opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(11,61,46,0.97); border-top: 1px solid var(--card-border); backdrop-filter: blur(14px); padding: 10px 0 18px; z-index: 100; }
    .bnav-inner { display: flex; justify-content: space-around; }
    .bnav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; color: var(--text-muted); font-size: 11px; font-weight: 600; text-decoration: none; transition: color 0.2s; }
    .bnav-item.active { color: var(--green-light); }
    .bnav-icon { font-size: 22px; }
    .bnav-publish { background: linear-gradient(135deg, var(--green-light), var(--green-mid)); color: #063521 !important; padding: 10px 22px; border-radius: 50px; margin-top: -18px; box-shadow: 0 4px 20px rgba(52,211,153,0.5); }
  </style>
</head>
<body>

<nav>
  <a href="home.html" class="nav-logo"><span class="yo">YO</span><span class="lo">lo</span><span class="vendo">VENDO</span></a>
  <a href="home.html" class="nav-back">← Inicio</a>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <h1>❤️ Mis favoritos</h1>
    <button class="btn-clear" onclick="limpiarTodos()">🗑 Limpiar todo</button>
  </div>
  <div class="fav-grid" id="favGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">🤍</div>
    <h3>Sin favoritos aún</h3>
    <p>Guarda los productos que te interesan tocando el corazón ❤️</p>
    <button class="btn-explorar" onclick="window.location.href='home.html'">Explorar productos</button>
  </div>
</div>

<div class="bottom-nav">
  <div class="bnav-inner">
    <a href="home.html" class="bnav-item"><span class="bnav-icon">🏠</span><span>Inicio</span></a>
    <a href="search.html" class="bnav-item"><span class="bnav-icon">🔍</span><span>Buscar</span></a>
    <a href="home.html" class="bnav-item bnav-publish"><span class="bnav-icon">＋</span><span>Publicar</span></a>
    <a href="chat.html" class="bnav-item"><span class="bnav-icon">💬</span><span>Chats</span></a>
    <a href="profile.html" class="bnav-item"><span class="bnav-icon">👤</span><span>Perfil</span></a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const supabase = createClient(
  'https://uvkjerejhhbpgyvpmxur.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2a2plcmVqaGhicGd5dnBteHVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTA0ODEsImV4cCI6MjA5MDQyNjQ4MX0.bWQEBRsrxeEdtMRAyOfTZsGKI526Ig629APP21saUVI'
)

const { data: { session } } = await supabase.auth.getSession()
if (!session) { window.location.href = 'index.html' }
const currentUser = session.user

// Guardamos favoritos en localStorage por usuario (clave única por user_id)
const FAV_KEY = `favorites_${currentUser.id}`

function getFavs() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]') } catch { return [] }
}
function saveFavs(list) {
  localStorage.setItem(FAV_KEY, JSON.stringify(list))
}

let favoritos = getFavs()

function renderFavs() {
  const grid  = document.getElementById('favGrid')
  const empty = document.getElementById('emptyState')
  grid.innerHTML = ''
  if (favoritos.length === 0) { empty.style.display = 'block'; return }
  empty.style.display = 'none'
  favoritos.forEach((p, i) => {
    const card = document.createElement('div')
    card.className = 'fav-card'
    card.style.animationDelay = `${i * 0.06}s`
    card.onclick = () => window.location.href = 'product-detail.html'
    const imgHtml = p.foto_url
      ? `<img src="${p.foto_url}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:0">`
      : (p.emoji || '📦')
    card.innerHTML = `
      <div class="fav-img">
        ${imgHtml}
        <span class="badge-tipo badge-${p.tipo}">${p.tipo === 'venta' ? 'Venta' : 'Trueque'}</span>
        <button class="btn-unfav" onclick="event.stopPropagation(); quitarFav('${p.id}')">❤️</button>
      </div>
      <div class="fav-body">
        <div class="fav-name">${p.nombre}</div>
        <div class="fav-desc">${p.descripcion || ''}</div>
        <div class="fav-footer">
          <span class="fav-price ${p.tipo==='trueque'?'t':''}">
            ${p.tipo === 'venta' ? '$'+(p.precio||0).toLocaleString('es-CO') : '🔄 Trueque'}
          </span>
          <button class="btn-contact" onclick="event.stopPropagation(); window.location.href='product-detail.html'">Ver</button>
        </div>
      </div>`
    grid.appendChild(card)
  })
}

window.quitarFav = (id) => {
  favoritos = favoritos.filter(p => p.id !== id)
  saveFavs(favoritos)
  renderFavs()
  showToast('🤍 Eliminado de favoritos')
}

window.limpiarTodos = () => {
  if (favoritos.length === 0) return
  if (confirm('¿Eliminar todos los favoritos?')) {
    favoritos = []
    saveFavs(favoritos)
    renderFavs()
    showToast('🗑 Favoritos eliminados')
  }
}

function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2500)
}

renderFavs()
</script>
</body>
</html>
