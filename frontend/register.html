<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear cuenta | Yo Lo Vendo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --yellow:#e6d44c; --yellow-dark:#7a6a00; --green-light:#34d399; --green-mid:#1fbf75; --red:#ff6b6b; --text-muted:#9fffd8; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Nunito',sans-serif; min-height:100vh;
      background:radial-gradient(circle at 20% 10%,#1fbf75 0%,#0b3d2e 45%,#071f17 100%);
      display:flex; justify-content:center; align-items:flex-start; padding:24px 20px;
    }
    .login-container { width:100%; max-width:420px; text-align:center; margin:0 auto; }

    /* LOGO */
    .title-frame {
      background:linear-gradient(135deg,#2dbb7a,#198f5c);
      border-radius:25px; padding:20px; margin-bottom:22px;
      box-shadow:inset 0 0 0 4px #0b5c3d,inset 0 0 0 7px #34d399;
    }
    .title-frame h1 { font-family:'Poppins',sans-serif; font-size:34px; font-weight:900; }
    .yo{color:#fff} .lo{color:rgba(255,255,255,0.75);font-weight:400} .vendo{color:var(--yellow);text-shadow:0 3px 0 var(--yellow-dark)}
    .line{width:70%;height:2px;background:#0b5c3d;margin:10px auto}
    .slogan{font-size:13px;color:#c0ffe8}

    /* CAJA */
    .login-box {
      background:rgba(0,0,0,0.35); padding:24px;
      border-radius:22px; backdrop-filter:blur(14px);
      border:1px solid rgba(52,211,153,0.15);
    }

    /* CAMPOS CON VALIDACIÓN */
    .field-wrap { position:relative; margin-bottom:6px; }
    .field-wrap input {
      width:100%; padding:12px 40px 12px 14px;
      border:1.5px solid rgba(52,211,153,0.25); border-radius:10px; outline:none;
      font-family:'Nunito',sans-serif; font-size:14px;
      background:rgba(255,255,255,0.93); color:#063521;
      transition:border-color .2s;
    }
    .field-wrap input:focus { border-color:var(--green-light); }
    .field-wrap input.ok  { border-color:var(--green-light)!important; }
    .field-wrap input.err { border-color:var(--red)!important; }
    .field-icon { position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:14px;opacity:0;pointer-events:none;transition:opacity .2s; }
    .field-msg { font-size:11px;min-height:16px;margin-bottom:8px;padding-left:4px;display:block; }
    .field-msg.ok  { color:var(--green-light); }
    .field-msg.err { color:var(--red); }

    /* BARRA FORTALEZA */
    .strength-bar { display:flex;gap:4px;margin-bottom:4px; }
    .strength-seg { flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,0.1);transition:background .3s; }
    .strength-label { font-size:11px;margin-bottom:8px;padding-left:4px;min-height:14px; }

    /* CHECKLIST */
    .req-list { list-style:none;padding:0;margin-bottom:10px; }
    .req-list li { font-size:11px;color:rgba(159,255,216,0.5);display:flex;align-items:center;gap:5px;margin-bottom:2px;transition:color .2s; }
    .req-list li.met { color:var(--green-light); }
    .req-list li::before { content:'○';font-size:10px; }
    .req-list li.met::before { content:'✓'; }

    /* MENSAJE GLOBAL */
    .msg-box { padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none;line-height:1.5; }
    .msg-box.error   { background:rgba(255,107,107,0.15);color:#ffaaaa;border:1px solid rgba(255,107,107,0.3); }
    .msg-box.success { background:rgba(52,211,153,0.15);color:#9fffd8;border:1px solid rgba(52,211,153,0.3); }

    /* BOTÓN */
    .btn-main {
      width:100%; padding:14px; margin-top:4px;
      background:linear-gradient(135deg,#5cffb1,#22d389);
      border:none; border-radius:12px; font-weight:800; font-size:15px;
      cursor:pointer; font-family:'Poppins',sans-serif; color:#063521;
      transition:opacity .2s,transform .15s;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-main:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 6px 20px rgba(52,211,153,.35); }
    .btn-main:disabled { opacity:.5; cursor:not-allowed; }

    .spinner { width:16px;height:16px;border:2px solid #063521;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;display:none; }
    @keyframes spin { to{transform:rotate(360deg)} }

    .link-row { margin-top:14px;font-size:13px;color:#9fffd8;text-align:center; }
    .link-row a { color:var(--green-light);font-weight:700;text-decoration:none; }
    .link-row a:hover { text-decoration:underline; }
    .terms { margin-top:10px;font-size:11px;color:rgba(159,255,216,0.6);text-align:center; }
    .terms a { color:var(--green-light);text-decoration:none; }
  </style>
</head>
<body>
<div class="login-container">

  <div class="title-frame">
    <h1><span class="yo">YO</span><span class="lo"> lo </span><span class="vendo">VENDO</span></h1>
    <div class="line"></div>
    <p class="slogan">Compra, vende e intercambia fácil y seguro</p>
  </div>

  <div class="login-box">

    <div class="msg-box" id="msgBox"></div>

    <!-- Nombre -->
    <div class="field-wrap">
      <input type="text" id="fNombre" placeholder="Nombre completo" oninput="valNombre()" autocomplete="name">
      <span class="field-icon" id="iNombre"></span>
    </div>
    <span class="field-msg" id="mNombre"></span>

    <!-- Username único -->
    <div class="field-wrap">
      <input type="text" id="fUsername" placeholder="Nombre de usuario (ej: carlos_intep)" oninput="valUsername()" autocomplete="username">
      <span class="field-icon" id="iUsername"></span>
    </div>
    <span class="field-msg" id="mUsername"></span>

    <!-- Correo -->
    <div class="field-wrap">
      <input type="email" id="fCorreo" placeholder="Correo institucional (@intep.edu.co)" oninput="valCorreo()" autocomplete="email">
      <span class="field-icon" id="iCorreo"></span>
    </div>
    <span class="field-msg" id="mCorreo"></span>

    <!-- Contraseña -->
    <div class="field-wrap">
      <input type="password" id="fPass" placeholder="Contraseña" oninput="valPass()" autocomplete="new-password">
      <span class="field-icon" id="iPass"></span>
    </div>
    <div class="strength-bar">
      <div class="strength-seg" id="s1"></div>
      <div class="strength-seg" id="s2"></div>
      <div class="strength-seg" id="s3"></div>
      <div class="strength-seg" id="s4"></div>
    </div>
    <div class="strength-label" id="strengthLabel"></div>
    <ul class="req-list">
      <li id="req-len">Mínimo 8 caracteres</li>
      <li id="req-num">Al menos un número</li>
      <li id="req-upper">Al menos una mayúscula</li>
      <li id="req-special">Al menos un símbolo (!@#...)</li>
    </ul>

    <!-- Confirmar -->
    <div class="field-wrap">
      <input type="password" id="fPass2" placeholder="Confirmar contraseña" oninput="valPass2()" autocomplete="new-password">
      <span class="field-icon" id="iPass2"></span>
    </div>
    <span class="field-msg" id="mPass2"></span>

    <button class="btn-main" id="btnRegistrar" onclick="doRegister()" disabled>
      <div class="spinner" id="spinReg"></div>
      <span id="lblReg">Crear cuenta</span>
    </button>

    <div class="terms">
      Al registrarte aceptas nuestros <a href="terms.html" target="_blank">Términos y Condiciones</a>
    </div>
    <div class="link-row">
      ¿Ya tienes cuenta? <a href="index.html">Iniciar sesión</a>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const supabase = createClient(
  'https://uvkjerejhhbpgyvpmxur.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2a2plcmVqaGhicGd5dnBteHVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTA0ODEsImV4cCI6MjA5MDQyNjQ4MX0.bWQEBRsrxeEdtMRAyOfTZsGKI526Ig629APP21saUVI'
)

// Si ya tiene sesión → ir al home
const { data: { session } } = await supabase.auth.getSession()
if (session) { window.location.href = 'home.html' }

const state = { nombre:false, username:false, correo:false, pass:false, pass2:false }

function setField(inputId, iconId, msgId, ok, msg) {
  const input = document.getElementById(inputId)
  const icon  = iconId ? document.getElementById(iconId) : null
  const msgEl = msgId  ? document.getElementById(msgId)  : null
  if (input) input.className = ok ? 'ok' : (msg ? 'err' : '')
  if (icon)  { icon.textContent = ok ? '✅' : (msg ? '❌' : ''); icon.style.opacity = (ok||msg) ? '1' : '0' }
  if (msgEl) { msgEl.textContent = msg || ''; msgEl.className = 'field-msg '+(ok?'ok':(msg?'err':'')) }
}
function checkBtn() {
  document.getElementById('btnRegistrar').disabled = !(state.nombre && state.username && state.correo && state.pass && state.pass2)
}
function showMsg(txt, type='error') {
  const b = document.getElementById('msgBox'); b.textContent = txt; b.className = `msg-box ${type}`; b.style.display = 'block'
}
function setLoading(on) {
  document.getElementById('btnRegistrar').disabled = on
  document.getElementById('spinReg').style.display  = on ? 'block' : 'none'
  document.getElementById('lblReg').style.display   = on ? 'none'  : 'inline'
}


window.valUsername = async () => {
  const v = document.getElementById('fUsername').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'')
  document.getElementById('fUsername').value = v
  if (!v) { setField('fUsername','iUsername','mUsername',false,''); state.username=false; checkBtn(); return }
  if (v.length < 3) { setField('fUsername','iUsername','mUsername',false,'⚠ Mínimo 3 caracteres'); state.username=false; checkBtn(); return }
  if (!/^[a-z0-9_]+$/.test(v)) { setField('fUsername','iUsername','mUsername',false,'⚠ Solo letras, números y _'); state.username=false; checkBtn(); return }
  // Verificar disponibilidad en Supabase
  setField('fUsername','iUsername','mUsername',false,'')
  document.getElementById('iUsername').textContent = '⏳'; document.getElementById('iUsername').style.opacity = '1'
  const { data } = await supabase.from('users').select('id').eq('username', v).maybeSingle()
  if (data) { setField('fUsername','iUsername','mUsername',false,'❌ Ese nombre ya está en uso'); state.username=false }
  else      { setField('fUsername','iUsername','mUsername',true,'✓ Disponible'); state.username=true }
  checkBtn()
}

window.valNombre = () => {
  const v = document.getElementById('fNombre').value.trim()
  const words = v.split(/\s+/).filter(Boolean)
  if (!v)              { setField('fNombre','iNombre','mNombre',false,''); state.nombre=false }
  else if (words.length<2) { setField('fNombre','iNombre','mNombre',false,'⚠ Escribe nombre y apellido'); state.nombre=false }
  else                 { setField('fNombre','iNombre','mNombre',true,'✓ Nombre válido'); state.nombre=true }
  checkBtn()
}

window.valCorreo = () => {
  const v = document.getElementById('fCorreo').value.trim().toLowerCase()
  if (!v)                        { setField('fCorreo','iCorreo','mCorreo',false,''); state.correo=false }
  else if (!v.endsWith('@intep.edu.co')) { setField('fCorreo','iCorreo','mCorreo',false,'⚠ Debe ser correo @intep.edu.co'); state.correo=false }
  else                           { setField('fCorreo','iCorreo','mCorreo',true,'✓ Correo institucional válido'); state.correo=true }
  checkBtn()
}

const strengthColors = ['#ff6b6b','#f59e0b','#34d399','#1fbf75']
const strengthNames  = ['Muy débil','Débil','Buena','Muy segura']
function getStrength(p) {
  let s=0
  if(p.length>=8)s++; if(/[0-9]/.test(p))s++; if(/[A-Z]/.test(p))s++; if(/[^A-Za-z0-9]/.test(p))s++
  return s
}

window.valPass = () => {
  const v = document.getElementById('fPass').value
  const score = getStrength(v)
  document.getElementById('req-len').classList.toggle('met',v.length>=8)
  document.getElementById('req-num').classList.toggle('met',/[0-9]/.test(v))
  document.getElementById('req-upper').classList.toggle('met',/[A-Z]/.test(v))
  document.getElementById('req-special').classList.toggle('met',/[^A-Za-z0-9]/.test(v))
  for(let i=1;i<=4;i++) document.getElementById(`s${i}`).style.background = i<=score ? strengthColors[score-1] : 'rgba(255,255,255,0.1)'
  const lbl = document.getElementById('strengthLabel')
  lbl.textContent = v ? (strengthNames[score-1]||'Muy débil') : ''
  if(v) lbl.style.color = strengthColors[score-1]||'#ff6b6b'
  const iPass = document.getElementById('iPass')
  document.getElementById('fPass').className = !v?'':score<3?'err':'ok'
  iPass.textContent = !v?'':score<3?'❌':'✅'; iPass.style.opacity = v?'1':'0'
  state.pass = !!(v && score>=3)
  if(document.getElementById('fPass2').value) valPass2()
  checkBtn()
}

window.valPass2 = () => {
  const p1=document.getElementById('fPass').value, p2=document.getElementById('fPass2').value
  if(!p2)       { setField('fPass2','iPass2','mPass2',false,''); state.pass2=false }
  else if(p2!==p1){ setField('fPass2','iPass2','mPass2',false,'⚠ Las contraseñas no coinciden'); state.pass2=false }
  else          { setField('fPass2','iPass2','mPass2',true,'✓ Coinciden'); state.pass2=true }
  checkBtn()
}

window.doRegister = async () => {
  const nombre   = document.getElementById('fNombre').value.trim()
  const username = document.getElementById('fUsername').value.trim().toLowerCase()
  const email    = document.getElementById('fCorreo').value.trim().toLowerCase()
  const pass     = document.getElementById('fPass').value

  setLoading(true)

  const { data, error } = await supabase.auth.signUp({
    email, password: pass,
    options: { data: { nombre, username, role: 'user' } }
  })

  if (error) {
    setLoading(false)
    const msgs = {
      'User already registered': '❌ Este correo ya tiene una cuenta. Inicia sesión.',
      'Password should be at least 6 characters': '❌ La contraseña debe tener al menos 6 caracteres.',
    }
    showMsg(msgs[error.message] || ('❌ ' + error.message)); return
  }

  // Insertar perfil en tabla users
  if (data.user) {
    await supabase.from('users').upsert({
      id: data.user.id, nombre, username, correo: email, role: 'user'
    })
  }

  setLoading(false)
  // Guardar datos temporalmente para mostrar en success.html
  sessionStorage.setItem('regNombre', nombre)
  sessionStorage.setItem('regCorreo', email)
  // Redirigir a cuenta creada
  window.location.href = 'success.html'
}
</script>
</body>
</html>
