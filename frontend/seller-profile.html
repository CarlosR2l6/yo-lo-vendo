<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfil del vendedor | Yo Lo Vendo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --green-dark:#0b3d2e; --green-mid:#1fbf75; --green-light:#34d399;
      --yellow:#e6d44c; --yellow-dark:#7a6a00;
      --card-bg:rgba(255,255,255,0.06); --card-border:rgba(52,211,153,0.2);
      --text-main:#eafff5; --text-muted:#9fffd8; --red:#ff6b6b;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;background:radial-gradient(ellipse at top left,#1a5c3a,#0b3d2e 50%,#071f17);min-height:100vh;color:var(--text-main);padding-bottom:100px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}

    nav{position:sticky;top:0;z-index:100;background:rgba(11,61,46,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--card-border);padding:0 24px;height:64px;display:flex;align-items:center;gap:16px}
    .nav-logo{font-family:'Poppins',sans-serif;font-size:22px;font-weight:900;text-decoration:none}
    .nav-logo .yo{color:#fff} .nav-logo .lo{color:#fff;font-weight:400} .nav-logo .vendo{color:var(--yellow);text-shadow:0 2px 0 var(--yellow-dark)}
    .nav-back{margin-left:auto;background:rgba(255,255,255,0.08);border:1px solid var(--card-border);color:var(--text-muted);padding:8px 16px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px;transition:border-color .2s}
    .nav-back:hover{border-color:var(--green-light);color:var(--green-light)}

    /* COVER */
    .cover{height:150px;background:linear-gradient(135deg,#1a5c3a 0%,#0b3d2e 50%,#1a3a1a 100%);position:relative;overflow:hidden}
    .cover-img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;display:none}
    .cover-pattern{position:absolute;inset:0;opacity:.07;background-image:radial-gradient(circle,#34d399 1px,transparent 1px);background-size:28px 28px}
    .cover-report{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);font-size:12px;font-weight:700;padding:6px 13px;border-radius:50px;cursor:pointer;font-family:'Nunito',sans-serif;backdrop-filter:blur(6px);transition:all .2s}
    .cover-report:hover{background:rgba(255,107,107,.2);color:#ffaaaa;border-color:rgba(255,107,107,.4)}

    /* HEADER */
    .profile-header{max-width:700px;margin:0 auto;padding:0 24px;position:relative}
    .header-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap}
    .avatar-wrap{position:relative;display:inline-block;margin-top:-48px}
    .avatar-big{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--green-light),var(--yellow));border:4px solid #0b3d2e;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-size:34px;font-weight:800;color:#063521;overflow:hidden}
    .avatar-big img{width:100%;height:100%;object-fit:cover;display:none}
    .avatar-letter{}
    .online-dot{position:absolute;bottom:6px;right:2px;width:14px;height:14px;border-radius:50%;background:#22c55e;border:3px solid #0b3d2e}
    .header-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
    .btn-contact-main{background:linear-gradient(135deg,var(--green-light),var(--green-mid));color:#063521;font-family:'Poppins',sans-serif;font-weight:700;font-size:13px;padding:9px 16px;border-radius:50px;border:none;cursor:pointer;transition:transform .15s}
    .btn-contact-main:hover{transform:translateY(-1px)}
    .btn-wa{background:rgba(52,211,153,.12);border:1.5px solid var(--green-light);color:var(--green-light);font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;padding:9px 16px;border-radius:50px;cursor:pointer;transition:all .2s}
    .btn-wa:hover{background:rgba(52,211,153,.25)}
    .btn-follow{background:rgba(255,255,255,.08);border:1.5px solid var(--card-border);color:var(--text-muted);font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;padding:9px 16px;border-radius:50px;cursor:pointer;transition:all .2s}
    .btn-follow:hover,.btn-follow.following{background:rgba(52,211,153,.1);border-color:var(--green-light);color:var(--green-light)}

    .profile-info{margin-bottom:20px}
    .profile-name{font-family:'Poppins',sans-serif;font-size:22px;font-weight:800;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .badge-verified{background:var(--green-mid);color:#063521;font-size:10px;font-weight:800;padding:2px 9px;border-radius:50px}
    .profile-carrera{font-size:13px;color:var(--text-muted);margin-top:3px}
    .profile-bio{font-size:14px;color:var(--text-main);opacity:.85;margin-top:8px;line-height:1.6}
    .stars-wrap{display:flex;align-items:center;gap:8px;margin-top:10px}
    .stars{display:flex;gap:2px;color:var(--yellow);font-size:16px}
    .rating-val{font-family:'Poppins',sans-serif;font-weight:800;font-size:15px;color:var(--yellow)}
    .rating-count{font-size:12px;color:var(--text-muted)}
    .profile-meta{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
    .meta-item{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px}

    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0;max-width:700px;margin-left:auto;margin-right:auto;padding:0 24px}
    .stat-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:14px 10px;text-align:center;animation:fadeUp .4s ease both}
    .stat-number{font-family:'Poppins',sans-serif;font-size:22px;font-weight:800;color:var(--green-light)}
    .stat-label{font-size:11px;color:var(--text-muted);margin-top:2px}

    /* SECTION */
    .section-wrap{max-width:700px;margin:0 auto;padding:0 24px}
    .tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab-btn{flex-shrink:0;padding:8px 18px;border-radius:50px;border:1.5px solid var(--card-border);background:transparent;color:var(--text-muted);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
    .tab-btn.active{background:var(--green-mid);color:#063521;border-color:var(--green-mid)}

    /* GRID PRODUCTOS */
    .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:24px}
    .product-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;animation:fadeUp .4s ease both}
    .product-card:hover{transform:translateY(-4px);border-color:var(--green-light)}
    .card-img{width:100%;aspect-ratio:1;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;overflow:hidden}
    .card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
    .badge-tipo{position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:50px}
    .badge-venta{background:var(--green-mid);color:#063521}
    .badge-trueque{background:var(--yellow);color:var(--yellow-dark)}
    .card-body{padding:10px 12px 12px}
    .card-name{font-weight:700;font-size:13px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-desc{font-size:11px;color:var(--text-muted);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-price{font-family:'Poppins',sans-serif;font-weight:800;font-size:14px;color:var(--green-light)}
    .card-price.t{color:var(--yellow);font-size:12px}

    /* RESEÑAS */
    .reviews-list{display:flex;flex-direction:column;gap:12px}
    .review-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:16px;animation:fadeUp .4s ease both}
    .review-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .review-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--green-light),var(--yellow));display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-size:13px;font-weight:800;color:#063521;flex-shrink:0}
    .review-meta{}
    .review-name{font-weight:700;font-size:13px}
    .review-date{font-size:11px;color:var(--text-muted);margin-top:1px}
    .review-stars{color:var(--yellow);font-size:14px;margin-bottom:6px}
    .review-text{font-size:13px;color:var(--text-main);opacity:.9;line-height:1.6;margin-bottom:6px}
    .review-producto{font-size:11px;color:var(--text-muted)}

    /* EMPTY */
    .empty-tab{text-align:center;padding:36px 20px;color:var(--text-muted)}
    .empty-tab .icon{font-size:44px;margin-bottom:10px}
    .empty-tab p{font-size:13px}

    /* LOADING */
    .loading-box{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px;color:var(--text-muted);font-size:14px}
    .spin{width:20px;height:20px;border:2px solid var(--text-muted);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}

    /* BOTTOM NAV */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(11,61,46,0.97);border-top:1px solid var(--card-border);backdrop-filter:blur(14px);padding:10px 0 18px;z-index:100}
    .bnav-inner{display:flex;justify-content:space-around}
    .bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--text-muted);font-size:11px;font-weight:600;text-decoration:none;transition:color .2s}
    .bnav-item.active{color:var(--green-light)}
    .bnav-icon{font-size:22px}
    .bnav-publish{background:linear-gradient(135deg,var(--green-light),var(--green-mid));color:#063521!important;padding:10px 22px;border-radius:50px;margin-top:-18px;box-shadow:0 4px 20px rgba(52,211,153,.5)}

    /* MODAL REPORTE */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.open{display:flex}
    .modal-box{background:linear-gradient(160deg,#0f4a32,#0b3d2e);border:1px solid var(--green-light);border-radius:20px;padding:24px;width:100%;max-width:420px}
    .modal-box h3{font-family:'Poppins',sans-serif;font-size:17px;font-weight:800;margin-bottom:16px}
    .report-options{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
    .report-opt{padding:12px 14px;border-radius:10px;border:1.5px solid var(--card-border);background:transparent;color:var(--text-muted);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:left;transition:all .2s}
    .report-opt.selected,.report-opt:hover{border-color:var(--red);color:var(--red);background:rgba(255,107,107,.06)}
    .modal-actions{display:flex;gap:10px}
    .btn-cancel-report{flex:1;padding:11px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid var(--card-border);color:var(--text-muted);font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer}
    .btn-send-report{flex:2;padding:11px;border-radius:10px;background:var(--red);border:none;color:#fff;font-family:'Poppins',sans-serif;font-weight:700;cursor:pointer}

    /* TOAST */
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green-mid);color:#063521;font-weight:700;font-size:14px;padding:12px 24px;border-radius:50px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.3)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* NOT FOUND */
    .not-found{text-align:center;padding:80px 20px;color:var(--text-muted)}
    .not-found .icon{font-size:64px;margin-bottom:16px}
    .not-found h3{font-family:'Poppins',sans-serif;font-size:20px;font-weight:700;color:var(--text-main);margin-bottom:10px}
    .not-found p{font-size:14px;margin-bottom:24px}
    .not-found a{color:var(--green-light);font-weight:700;text-decoration:none}
  </style>
</head>
<body>

<nav>
  <a href="home.html" class="nav-logo"><span class="yo">YO</span><span class="lo">lo</span><span class="vendo">VENDO</span></a>

</nav>

<!-- COVER -->

<!-- CABECERA -->
<div class="profile-header">

        <img id="avatarImg" src="" alt="">

    <div class="header-actions">

  <div class="profile-info">
    <div class="profile-name">
      <span id="sellerName">Cargando...</span>
      <span class="badge-verified">✓ INTEP</span>

    <div class="profile-carrera" id="sellerCarrera"></div>

<!-- STATS -->
<div class="stats-row">

  <div class="stat-card" style="animation-delay:.1s"> <div class="stat-number" id="statVentas">0</div><div class="stat-label">Ventas</div></div>

<div class="section-wrap">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('activos',this)">📦 Activas</button>
    <button class="tab-btn" onclick="switchTab('vendidos',this)">✅ Vendidos</button>

  <div id="tab-activos"><div class="product-grid" id="gridActivos"></div></div>
  <div id="tab-vendidos" style="display:none"><div class="product-grid" id="gridVendidos"></div></div>
  <div id="tab-resenas"  style="display:none"><div class="reviews-list" id="listResenas"><div class="empty-tab"><div class="icon">⭐</div><p>Sin reseñas aún.</p></div></div></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="bnav-inner">
    <a href="home.html"    class="bnav-item"><span class="bnav-icon">🏠</span><span>Inicio</span></a>
    <a href="search.html"  class="bnav-item"><span class="bnav-icon">🔍</span><span>Buscar</span></a>
    <a href="home.html"    class="bnav-item bnav-publish"><span class="bnav-icon">＋</span><span>Publicar</span></a>
    <a href="chat.html"    class="bnav-item"><span class="bnav-icon">💬</span><span>Chats</span></a>
    <a href="profile.html" class="bnav-item"><span class="bnav-icon">👤</span><span>Perfil</span></a>
  </div>
</div>

<!-- MODAL REPORTE -->
<div class="modal-overlay" id="reportModal" onclick="if(event.target===this)closeReportModal()">
  <div class="modal-box">
    <h3>⚑ Reportar usuario</h3>
    <div class="report-options">
      <button class="report-opt" onclick="selectReport(this)">🚫 Información falsa o engañosa</button>
      <button class="report-opt" onclick="selectReport(this)">💸 Intento de estafa</button>
      <button class="report-opt" onclick="selectReport(this)">🤬 Conducta inapropiada</button>
      <button class="report-opt" onclick="selectReport(this)">📦 Producto no entregado</button>
      <button class="report-opt" onclick="selectReport(this)">🔞 Contenido prohibido</button>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel-report" onclick="closeReportModal()">Cancelar</button>
      <button class="btn-send-report"   onclick="enviarReporte()">Enviar reporte</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const supabase = createClient(
  'https://uvkjerejhhbpgyvpmxur.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2a2plcmVqaGhicGd5dnBteHVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTA0ODEsImV4cCI6MjA5MDQyNjQ4MX0.bWQEBRsrxeEdtMRAyOfTZsGKI526Ig629APP21saUVI'
)

const { data: { session } } = await supabase.auth.getSession()
if (!session) { window.location.href = 'index.html' }
const currentUser = session.user

// ── Leer ID del vendedor desde la URL ────────────────────
const params   = new URLSearchParams(window.location.search)
const sellerId = params.get('id')

const catEmojis = { tecnologia:'💻', libros:'📚', ropa:'👕', videojuegos:'🎮', accesorios:'🎧', otros:'📦' }

let vendedorData = null

if (!sellerId) {
  mostrarNotFound('No se especificó un vendedor.')
} else {
  await cargarVendedor()
if (sellerId && sellerId !== session.user.id) cargarEstadoFollow()
}

async function cargarVendedor() {
  // Cargar perfil del vendedor
  const { data: perfil, error } = await supabase
    .from('users')
    .select('id, nombre, username, correo, carrera, whatsapp, bio, avatar_url, cover_url, created_at')
    .eq('id', sellerId)
    .single()

  if (error || !perfil) { mostrarNotFound('Vendedor no encontrado.'); return }

  // Si el vendedor es el usuario actual → redirigir a su propio perfil
  if (sellerId === currentUser.id) {
    window.location.href = 'profile.html'; return
  }

  vendedorData = perfil
  renderVendedor(perfil)

  // Cargar publicaciones del vendedor
  const { data: productos } = await supabase
    .from('products')
    .select('id, nombre, descripcion, precio, tipo, estado, foto_url, categoria, vistas')
    .eq('user_id', sellerId)
    .order('created_at', { ascending: false })

  const activos  = (productos || []).filter(p => p.estado === 'activo')
  const vendidos = (productos || []).filter(p => p.estado === 'vendido')
  const totalVistas = (productos || []).reduce((a,p) => a + (p.vistas||0), 0)

  document.getElementById('statPubs').textContent   = productos?.length || 0
  document.getElementById('statVentas').textContent = vendidos.filter(p => p.tipo === 'venta').length
  document.getElementById('statVistas').textContent = totalVistas

  renderProductos(activos,  'gridActivos')
  renderProductos(vendidos, 'gridVendidos')
}

function renderVendedor(p) {
  const nombre  = p.nombre || p.correo?.split('@')[0] || 'Vendedor'
  const inicial = nombre[0]?.toUpperCase() || '?'

  document.title = nombre + ' | Yo Lo Vendo'
  document.getElementById('sellerName').textContent    = nombre
  document.getElementById('sellerBio').textContent     = p.bio || ''

  // Mostrar @username y carrera
  const subTexts = []
  if (p.username) subTexts.push('@' + p.username)
  if (p.carrera)  subTexts.push('🎓 ' + p.carrera)
  document.getElementById('sellerCarrera').textContent = subTexts.join(' · ')

  const avatarLetter = document.getElementById('avatarLetter')
  avatarLetter.textContent = inicial
  if (p.avatar_url) {
    const img = document.getElementById('avatarImg')
    img.src = p.avatar_url; img.style.display = 'block'
    avatarLetter.style.display = 'none'
  }

  if (p.cover_url) {
    const ci = document.getElementById('coverImg')
    ci.src = p.cover_url; ci.style.display = 'block'
  }

  const fechaMiembro = p.created_at
    ? new Date(p.created_at).toLocaleDateString('es-CO', { month:'long', year:'numeric' })
    : ''
  if (fechaMiembro) document.getElementById('metaMiembro').textContent = '📅 Desde ' + fechaMiembro
}

function renderProductos(lista, gridId) {
  const grid = document.getElementById(gridId)
  grid.innerHTML = ''
  if (!lista.length) {
    grid.innerHTML = `<div class="empty-tab" style="grid-column:1/-1"><div class="icon">📭</div><p>Sin publicaciones aquí.</p></div>`
    return
  }
  lista.forEach((p, i) => {
    const card = document.createElement('div')
    card.className = 'product-card'
    card.style.animationDelay = `${i * .06}s`
    card.onclick = () => window.location.href = `product-detail.html?id=${p.id}`
    const emoji     = catEmojis[p.categoria] || '📦'
    const imgContent = p.foto_url
      ? `<img src="${p.foto_url}" alt="${p.nombre}" loading="lazy">`
      : emoji
    card.innerHTML = `
      <div class="card-img">
        ${imgContent}
        <span class="badge-tipo badge-${p.tipo}">${p.tipo === 'venta' ? 'Venta' : 'Trueque'}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${p.nombre}</div>
        <div class="card-desc">${p.descripcion || ''}</div>
        <div class="card-price ${p.tipo==='trueque'?'t':''}">
          ${p.tipo === 'venta' ? '$'+(p.precio||0).toLocaleString('es-CO') : '🔄 Trueque'}
        </div>
      </div>`
    grid.appendChild(card)
  })
}

// ── TABS ─────────────────────────────────────────────────
window.switchTab = (tab, btn) => {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  ;['activos','vendidos','resenas'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === tab ? 'block' : 'none'
  })
}

// ── SEGUIR REAL ──────────────────────────────────────────
let following = false

async function cargarEstadoFollow() {
  const { data } = await supabase
    .from('follows')
    .select('id')
    .eq('follower_id', session.user.id)
    .eq('following_id', sellerId)
    .maybeSingle()
  following = !!data
  actualizarBtnFollow()
}

function actualizarBtnFollow() {
  const btn = document.getElementById('btnFollow')
  if (!btn) return
  if (following) {
    btn.textContent = '✓ Siguiendo'
    btn.classList.add('following')
  } else {
    btn.textContent = '＋ Seguir'
    btn.classList.remove('following')
  }
}

window.toggleFollow = async () => {
  if (!sellerId) return
  const btn = document.getElementById('btnFollow')
  btn.disabled = true

  if (following) {
    await supabase.from('follows')
      .delete()
      .eq('follower_id', session.user.id)
      .eq('following_id', sellerId)
    following = false
    showToast('Dejaste de seguir')
  } else {
    await supabase.from('follows').insert({
      follower_id:  session.user.id,
      following_id: sellerId
    })
    following = true
    showToast('✅ Ahora sigues a este vendedor')
  }
  btn.disabled = false
  actualizarBtnFollow()
}


window.iniciarChatConVendedor = async () => {
  if (!sellerId) return
  const { data: existing } = await supabase
    .from('conversations')
    .select('id')
    .or(`and(user_a.eq.${session.user.id},user_b.eq.${sellerId}),and(user_a.eq.${sellerId},user_b.eq.${session.user.id})`)
    .maybeSingle()

  let convId = existing?.id
  if (!convId) {
    const { data: nueva } = await supabase.from('conversations').insert({
      user_a: session.user.id,
      user_b: sellerId,
    }).select('id').single()
    convId = nueva?.id
  }
  window.location.href = convId ? `chat.html?conv=${convId}` : 'chat.html'
}

// ── WHATSAPP ─────────────────────────────────────────────
window.abrirWA = () => {
  const wa = vendedorData?.whatsapp
  if (!wa) { showToast('❌ El vendedor no tiene WhatsApp registrado'); return }
  const msg = encodeURIComponent('Hola, vi tu perfil en Yo Lo Vendo. ¿Tienes productos disponibles?')
  window.open(`https://wa.me/${wa.replace(/\D/g,'')}?text=${msg}`, '_blank')
}

// ── NOT FOUND ────────────────────────────────────────────
function mostrarNotFound(msg) {
  document.querySelector('.profile-header').innerHTML = `
    <div class="not-found">
      <div class="icon">👤</div>
      <h3>Vendedor no encontrado</h3>
      <p>${msg}</p>
      <a href="home.html">← Volver al inicio</a>
    </div>`
  document.querySelector('.stats-row').style.display = 'none'
  document.querySelector('.section-wrap').style.display = 'none'
}

// ── REPORTE ──────────────────────────────────────────────
let selectedReport = null
window.openReportModal  = () => document.getElementById('reportModal').classList.add('open')
window.closeReportModal = () => {
  document.getElementById('reportModal').classList.remove('open')
  selectedReport = null
  document.querySelectorAll('.report-opt').forEach(o => o.classList.remove('selected'))
}
window.selectReport = (btn) => {
  document.querySelectorAll('.report-opt').forEach(o => o.classList.remove('selected'))
  btn.classList.add('selected'); selectedReport = btn.textContent.trim()
}
window.enviarReporte = () => {
  if (!selectedReport) { showToast('⚠ Selecciona un motivo'); return }
  closeReportModal(); showToast('📩 Reporte enviado. Lo revisaremos pronto.')
}

// ── TOAST ────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 3000)
}
window.showToast = showToast
</script>
