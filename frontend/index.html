<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar sesión | Yo Lo Vendo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --yellow:#e6d44c; --yellow-dark:#7a6a00; --green-light:#34d399; --green-mid:#1fbf75; --red:#ff6b6b; --text-muted:#9fffd8; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Nunito',sans-serif; min-height:100vh;
      background:radial-gradient(circle at 20% 10%,#1fbf75 0%,#0b3d2e 45%,#071f17 100%);
      display:flex; justify-content:center; align-items:center; padding:20px;
    }
    .login-container { width:100%; max-width:420px; text-align:center; }

    /* LOGO */
    .title-frame {
      background:linear-gradient(135deg,#2dbb7a,#198f5c);
      border-radius:25px; padding:22px 20px 18px; margin-bottom:24px;
      box-shadow:inset 0 0 0 4px #0b5c3d,inset 0 0 0 7px #34d399;
    }
    .title-frame h1 { font-family:'Poppins',sans-serif; font-size:36px; font-weight:900; letter-spacing:-1px; }
    .yo{color:#fff} .lo{color:rgba(255,255,255,0.75);font-weight:400} .vendo{color:var(--yellow);text-shadow:0 3px 0 var(--yellow-dark)}
    .line{width:70%;height:2px;background:#0b5c3d;margin:10px auto}
    .slogan{font-size:13px;color:#c0ffe8;letter-spacing:.3px}

    /* CAJA */
    .login-box {
      background:rgba(0,0,0,0.35); padding:26px;
      border-radius:22px; backdrop-filter:blur(14px);
      border:1px solid rgba(52,211,153,0.15);
    }

    /* CAMPOS */
    .field-wrap { position:relative; margin-bottom:12px; }
    .field-wrap input {
      width:100%; padding:13px 16px;
      border:1.5px solid rgba(52,211,153,0.25); border-radius:11px; outline:none;
      font-family:'Nunito',sans-serif; font-size:14px;
      background:rgba(255,255,255,0.93); color:#063521;
      transition:border-color .2s;
    }
    .field-wrap input:focus { border-color:var(--green-light); }

    /* BOTÓN PRINCIPAL */
    .btn-main {
      width:100%; padding:14px; margin-top:4px;
      background:linear-gradient(135deg,#5cffb1,#22d389);
      border:none; border-radius:12px; font-weight:800; font-size:15px;
      cursor:pointer; font-family:'Poppins',sans-serif; color:#063521;
      transition:opacity .2s,transform .15s;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-main:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 6px 20px rgba(52,211,153,.35); }
    .btn-main:disabled { opacity:.5; cursor:not-allowed; }

    .spinner { width:16px;height:16px;border:2px solid #063521;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;display:none; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* MENSAJE */
    .msg-box {
      padding:10px 14px; border-radius:10px; font-size:13px;
      margin-bottom:16px; display:none; line-height:1.5; text-align:left;
    }
    .msg-box.error   { background:rgba(255,107,107,0.15); color:#ffaaaa; border:1px solid rgba(255,107,107,0.3); }
    .msg-box.success { background:rgba(52,211,153,0.15); color:#9fffd8;  border:1px solid rgba(52,211,153,0.3); }

    /* LINKS */
    .link-row { margin-top:14px; display:flex; justify-content:space-between; font-size:13px; }
    .link-row a { color:var(--text-muted); text-decoration:none; font-weight:700; transition:color .2s; }
    .link-row a:hover { color:var(--green-light); }

    /* DIVISOR */
    .divider { display:flex;align-items:center;gap:10px;margin:20px 0 16px;color:rgba(159,255,216,0.4);font-size:12px; }
    .divider::before,.divider::after { content:'';flex:1;height:1px;background:rgba(52,211,153,0.15); }

    /* BOTÓN REGISTRAR */
    .btn-secondary {
      width:100%; padding:13px;
      background:transparent; border:2px solid rgba(52,211,153,0.35);
      border-radius:12px; font-weight:700; font-size:15px;
      cursor:pointer; font-family:'Poppins',sans-serif; color:var(--green-light);
      transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-secondary:hover { background:rgba(52,211,153,0.08); border-color:var(--green-light); }
  </style>
</head>
<body>
<div class="login-container">

  <div class="title-frame">
    <h1><span class="yo">YO</span><span class="lo"> lo </span><span class="vendo">VENDO</span></h1>
    <div class="line"></div>
    <p class="slogan">🎓 Compra, vende e intercambia entre estudiantes INTEP</p>
  </div>

  <div class="login-box">

    <div class="msg-box" id="msgBox"></div>

    <div class="field-wrap">
      <input type="email" id="loginEmail" placeholder="Correo (@intep.edu.co)"
        oninput="clearMsg()" autocomplete="email">
    </div>

    <div class="field-wrap">
      <input type="password" id="loginPass" placeholder="Contraseña"
        oninput="clearMsg()"
        onkeydown="if(event.key==='Enter') doLogin()" autocomplete="current-password">
    </div>

    <button class="btn-main" id="btnLogin" onclick="doLogin()">
      <div class="spinner" id="spinLogin"></div>
      <span id="lblLogin">🔑 Iniciar sesión</span>
    </button>

    <div class="link-row">
      <a href="forgot-password.html">¿Olvidaste tu contraseña?</a>
      <a href="help.html">Ayuda</a>
    </div>

    <div class="divider">¿No tienes cuenta aún?</div>

    <button class="btn-secondary" onclick="window.location.href='register.html'">
      ✨ Crear cuenta nueva
    </button>

  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const supabase = createClient(
  'https://uvkjerejhhbpgyvpmxur.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2a2plcmVqaGhicGd5dnBteHVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTA0ODEsImV4cCI6MjA5MDQyNjQ4MX0.bWQEBRsrxeEdtMRAyOfTZsGKI526Ig629APP21saUVI'
)

// Sesión activa → redirigir
const { data: { session } } = await supabase.auth.getSession()
if (session) {
  const { data: uRow } = await supabase.from('users').select('role').eq('id', session.user.id).single()
  const isAdmin = session.user.user_metadata?.role === 'admin' || uRow?.role === 'admin'
  window.location.href = isAdmin ? 'admin.html' : 'home.html'
}

window.clearMsg = () => {
  const b = document.getElementById('msgBox'); b.style.display = 'none'; b.className = 'msg-box'
}
function showMsg(txt, type = 'error') {
  const b = document.getElementById('msgBox'); b.textContent = txt; b.className = `msg-box ${type}`; b.style.display = 'block'
}
function setLoading(on) {
  document.getElementById('btnLogin').disabled = on
  document.getElementById('spinLogin').style.display = on ? 'block' : 'none'
  document.getElementById('lblLogin').style.display  = on ? 'none'  : 'inline'
}

window.doLogin = async () => {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase()
  const pass  = document.getElementById('loginPass').value
  if (!email || !pass) { showMsg('⚠ Completa todos los campos.'); return }

  setLoading(true)
  const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass })
  setLoading(false)

  if (error) {
    const msgs = {
      'Invalid login credentials': '❌ Correo o contraseña incorrectos.',
      'Email not confirmed': '📧 Confirma tu correo antes de iniciar sesión.',
    }
    showMsg(msgs[error.message] || ('❌ ' + error.message)); return
  }

  // Verificar rol admin (metadata Y tabla users)
  const meta = data.user?.user_metadata || {}
  const { data: uRow } = await supabase.from('users').select('role').eq('id', data.user.id).single()
  const isAdmin = meta.role === 'admin' || uRow?.role === 'admin'
  window.location.href = isAdmin ? 'admin.html' : 'home.html'
}
</script>
</body>
</html>
