<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuenta creada | Yo Lo Vendo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1fbf75, #0b3d2e);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    :root { --yellow: #e6d44c; --yellow-dark: #7a6a00; }
    .login-container { width: 100%; max-width: 420px; text-align: center; }
    .title-frame {
      background: linear-gradient(135deg, #2dbb7a, #198f5c);
      border-radius: 25px; padding: 20px; margin-bottom: 30px;
      box-shadow: inset 0 0 0 4px #0b5c3d, inset 0 0 0 7px #34d399;
    }
    .title-frame h1 { font-family: 'Poppins', sans-serif; font-size: 34px; font-weight: 900; }
    .yo { color: white; }
    .lo { color: white; font-weight: 400; }
    .vendo { color: var(--yellow); text-shadow: 0 3px 0 var(--yellow-dark); }
    .line { width: 75%; height: 2px; background: #0b5c3d; margin: 10px auto; }
    .slogan { font-size: 14px; color: #eafff5; }
    .login-box {
      background: rgba(0,0,0,0.3); padding: 25px;
      border-radius: 20px; backdrop-filter: blur(10px);
    }
    .success-icon { font-size: 56px; margin-bottom: 14px; }
    .login-box p { color: #eafff5; font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
    .login-box button {
      width: 100%; padding: 14px;
      background: linear-gradient(to right, #5cffb1, #22d389);
      border: none; border-radius: 12px;
      font-weight: bold; font-size: 15px;
      cursor: pointer; font-family: 'Poppins', sans-serif;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="title-frame">
      <h1>
        <span class="yo">YO</span>
        <span class="lo"> lo </span>
        <span class="vendo">VENDO</span>
      </h1>
      <div class="line"></div>
      <p class="slogan">Cuenta creada exitosamente</p>
    </div>
    <div class="login-box">
      <div class="success-icon">🎉</div>
      <p>Tu cuenta ha sido creada correctamente. Ya puedes empezar a vender, comprar y hacer trueques.</p>
      <button onclick="window.location.href='onboarding.html'">Comenzar →</button>
    </div>
  </div>
</body>
</html>
