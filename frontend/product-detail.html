<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detalle Producto | Yo Lo Vendo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --green-dark: #0b3d2e;
      --green-mid: #1fbf75;
      --green-light: #34d399;
      --yellow: #e6d44c;
      --yellow-dark: #7a6a00;
      --card-bg: rgba(255,255,255,0.06);
      --card-border: rgba(52,211,153,0.2);
      --text-main: #eafff5;
      --text-muted: #9fffd8;
      --red: #ff6b6b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: radial-gradient(ellipse at top left, #1a5c3a, #0b3d2e 50%, #071f17);
      min-height: 100vh; color: var(--text-main); padding-bottom: 100px;
    }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(11,61,46,0.92); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--card-border);
      padding: 0 24px; height: 64px; display: flex; align-items: center; gap: 16px;
    }
    .nav-logo { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 900; text-decoration: none; }
    .nav-logo .yo { color: #fff; }
    .nav-logo .lo { color: #fff; font-weight: 400; }
    .nav-logo .vendo { color: var(--yellow); text-shadow: 0 2px 0 var(--yellow-dark); }
    .nav-back {
      margin-left: auto; background: rgba(255,255,255,0.08);
      border: 1px solid var(--card-border); color: var(--text-muted);
      padding: 8px 16px; border-radius: 50px; font-family: 'Nunito', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; gap: 6px;
    }
    .page-wrap { max-width: 760px; margin: 0 auto; padding: 28px 24px; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .product-image-box {
      width: 100%; aspect-ratio: 1.4; background: var(--card-bg);
      border: 1px solid var(--card-border); border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 110px; position: relative; margin-bottom: 24px;
      overflow: hidden; animation: fadeUp 0.4s ease both;
    }
    .product-image-box img { width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 20px; }
    .badge-tipo { position: absolute; top: 14px; left: 14px; font-size: 13px; font-weight: 800; padding: 5px 14px; border-radius: 50px; }
    .badge-venta   { background: var(--green-mid); color: #063521; }
    .badge-trueque { background: var(--yellow); color: var(--yellow-dark); }
    .badge-fav {
      position: absolute; top: 14px; right: 14px; width: 40px; height: 40px;
      border-radius: 50%; background: rgba(0,0,0,0.4); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer; transition: transform 0.2s;
    }
    .badge-fav:hover { transform: scale(1.15); }
    .info-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 20px; padding: 24px; margin-bottom: 18px;
      animation: fadeUp 0.4s ease both;
    }
    .product-title { font-family: 'Poppins', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 6px; line-height: 1.2; }
    .product-category { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
    .product-price { font-family: 'Poppins', sans-serif; font-size: 32px; font-weight: 900; color: var(--green-light); margin-bottom: 6px; }
    .product-price.trueque { color: var(--yellow); font-size: 20px; }
    .trueque-desc {
      font-size: 14px; color: var(--text-muted);
      background: rgba(230,212,76,0.08); border: 1px solid rgba(230,212,76,0.2);
      border-radius: 10px; padding: 10px 14px; margin-bottom: 14px;
    }
    .divider { height: 1px; background: var(--card-border); margin: 16px 0; }
    .product-desc { font-size: 14px; line-height: 1.7; color: var(--text-main); opacity: 0.9; }
    .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    .detail-item { background: rgba(255,255,255,0.04); border: 1px solid var(--card-border); border-radius: 10px; padding: 10px 14px; }
    .detail-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
    .detail-value { font-size: 14px; font-weight: 700; }
    .seller-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 20px; padding: 20px 24px; margin-bottom: 18px;
      display: flex; align-items: center; gap: 16px; animation: fadeUp 0.5s ease both;
    }
    .seller-avatar-big {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--green-light), var(--yellow));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 900;
      color: #063521; flex-shrink: 0; overflow: hidden;
    }
    .seller-avatar-big img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .seller-info { flex: 1; }
    .seller-name-big { font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 800; }
    .seller-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .seller-stars { color: var(--yellow); font-size: 13px; margin-top: 4px; }
    .btn-ver-perfil {
      background: rgba(255,255,255,0.07); border: 1px solid var(--card-border);
      color: var(--text-muted); padding: 8px 16px; border-radius: 50px;
      font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .btn-ver-perfil:hover { border-color: var(--green-light); color: var(--green-light); }
    .section-title { font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .related-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s;
    }
    .related-card:hover { transform: translateY(-3px); border-color: var(--green-light); }
    .related-img { aspect-ratio: 1; background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center; font-size: 40px; overflow: hidden; }
    .related-img img { width: 100%; height: 100%; object-fit: cover; }
    .related-body { padding: 10px 12px; }
    .related-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .related-price { font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 800; color: var(--green-light); }
    .related-price.t { color: var(--yellow); font-size: 12px; }
    .gallery-thumbs { display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto; scrollbar-width: none; }
    .gallery-thumbs::-webkit-scrollbar { display: none; }
    .thumb {
      width: 64px; height: 64px; border-radius: 10px; flex-shrink: 0;
      background: var(--card-bg); border: 2px solid transparent;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; cursor: pointer; transition: border-color .2s; overflow: hidden;
    }
    .thumb.active { border-color: var(--green-light); }
    .thumb img { width:100%; height:100%; object-fit:cover; }
    .thumb:hover { border-color: rgba(52,211,153,0.5); }
    .views-badge {
      position: absolute; bottom: 14px; right: 14px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8); font-size: 12px; font-weight: 700;
      padding: 5px 11px; border-radius: 50px; font-family: 'Nunito', sans-serif;
    }
    .action-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(11,61,46,0.97); border-top: 1px solid var(--card-border);
      backdrop-filter: blur(14px); padding: 14px 24px 24px;
      display: flex; gap: 12px; z-index: 100;
    }
    .btn-wa {
      flex: 1; padding: 14px; border-radius: 14px; border: none;
      background: linear-gradient(135deg, var(--green-light), var(--green-mid));
      color: #063521; font-family: 'Poppins', sans-serif; font-weight: 700;
      font-size: 15px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 8px; transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-wa:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(52,211,153,0.4); }
    .btn-share {
      width: 52px; height: 52px; border-radius: 14px;
      border: 1.5px solid var(--card-border); background: transparent;
      color: var(--text-muted); font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: border-color 0.2s;
    }
    .btn-share:hover { border-color: var(--green-light); color: var(--green-light); }
    .toast {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--green-mid); color: #063521; font-weight: 700; font-size: 14px;
      padding: 12px 24px; border-radius: 50px; opacity: 0; transition: all 0.3s;
      z-index: 999; white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
      z-index: 200; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: linear-gradient(160deg, #0f4a32, #0b3d2e);
      border: 1px solid var(--green-light); border-radius: 24px 24px 0 0;
      padding: 28px 24px 36px; width: 100%; max-width: 760px;
      animation: slideUp 0.3s ease both;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 40px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.2); margin: 0 auto 20px; }
    .modal-sheet h3 { font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .modal-sheet p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .contact-options { display: flex; flex-direction: column; gap: 10px; }
    .contact-btn {
      width: 100%; padding: 14px 20px; border-radius: 14px;
      border: 1.5px solid var(--card-border); background: rgba(255,255,255,0.05);
      color: var(--text-main); font-family: 'Nunito', sans-serif; font-weight: 700;
      font-size: 15px; cursor: pointer; display: flex; align-items: center;
      gap: 12px; transition: all 0.2s; text-align: left;
    }
    .contact-btn:hover { border-color: var(--green-light); background: rgba(52,211,153,0.08); }
    .contact-btn .icon { font-size: 24px; }
    .contact-btn .sub { font-size: 11px; color: var(--text-muted); font-weight: 400; margin-top: 1px; }
    .btn-cancel-sheet {
      width: 100%; margin-top: 12px; padding: 13px; border-radius: 14px;
      border: 1px solid var(--card-border); background: transparent;
      color: var(--text-muted); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer;
    }
    .not-found { text-align: center; padding: 60px 24px; color: var(--text-muted); }
    .not-found .icon { font-size: 64px; margin-bottom: 16px; }
  </style>
</head>
<body>

<nav>
  <a href="home.html" class="nav-logo">
    <span class="yo">YO</span><span class="lo">lo</span><span class="vendo">VENDO</span>
  </a>
  <a href="home.html" class="nav-back">← Volver</a>
</nav>

<div class="page-wrap">

  <div class="product-image-box" id="productImageBox">
    <span id="productEmoji">📦</span>
    <img id="productImg" src="" alt="">
    <span class="badge-tipo badge-venta" id="badgeTipo">Venta</span>
    <div class="badge-fav" id="favBtn" onclick="toggleFav()">🤍</div>
    <div class="views-badge" id="viewsBadge">👁 0 vistas</div>
  </div>

  <div class="gallery-thumbs" id="galleryThumbs"></div>

  <div class="info-card">
    <div class="product-title" id="productTitle">Cargando...</div>
    <div class="product-category" id="productCategory"></div>
    <div class="product-price" id="productPrice"></div>
    <div class="trueque-desc" id="truequeDesc" style="display:none;">
      🔄 A cambio busco: <strong id="truequeWant">—</strong>
    </div>
    <div class="divider"></div>
    <div class="product-desc" id="productDesc"></div>
    <div class="details-grid">
      <div class="detail-item">
        <div class="detail-label">Estado</div>
        <div class="detail-value" id="detEstado">—</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Categoría</div>
        <div class="detail-value" id="detCategoria">—</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Tipo</div>
        <div class="detail-value" id="detTipo">—</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Publicado</div>
        <div class="detail-value" id="detFecha">🕐 Hoy</div>
      </div>
    </div>
  </div>

  <div class="seller-card">
    <div class="seller-avatar-big" id="sellerAvatar">?</div>
    <div class="seller-info">
      <div class="seller-name-big" id="sellerName">Cargando...</div>
      <div class="seller-sub" id="sellerSub">Estudiante INTEP</div>
      <div class="seller-stars">⭐⭐⭐⭐⭐ <span style="font-size:11px;color:var(--text-muted)">5.0</span></div>
    </div>
    <button class="btn-ver-perfil" id="btnVerPerfil">Ver perfil →</button>
  </div>

  <div class="section-title">🔁 También te puede interesar</div>
  <div class="related-grid" id="relatedGrid"></div>

</div>

<div class="action-bar">
  <button class="btn-wa" onclick="iniciarChatDirecto()">💬 Contactar vendedor</button>
  <button class="btn-share" onclick="shareProduct()" title="Compartir">🔗</button>
</div>

<div class="modal-overlay" id="contactModal" onclick="handleModalClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3>💬 Contactar vendedor</h3>
    <p>Elige cómo comunicarte con <strong id="modalSellerName">el vendedor</strong></p>
    <div class="contact-options">
      <button class="contact-btn" onclick="contactWA()">
        <span class="icon">📱</span>
        <div><div>WhatsApp</div><div class="sub">Enviar mensaje directo</div></div>
      </button>
      <button class="contact-btn" onclick="contactEmail()">
        <span class="icon">📧</span>
        <div><div>Correo institucional</div><div class="sub" id="modalEmail">—</div></div>
      </button>
      <button class="contact-btn" onclick="irAlChatDirecto()">
        <span class="icon">💬</span>
        <div><div>Chat en la app</div><div class="sub">Inicia conversación directo aquí</div></div>
      </button>
    </div>
    <button class="btn-cancel-sheet" onclick="closeContact()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const supabase = createClient(
  'https://uvkjerejhhbpgyvpmxur.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2a2plcmVqaGhicGd5dnBteHVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTA0ODEsImV4cCI6MjA5MDQyNjQ4MX0.bWQEBRsrxeEdtMRAyOfTZsGKI526Ig629APP21saUVI'
)

const { data: { session } } = await supabase.auth.getSession()
if (!session) { window.location.href = 'index.html' }
const currentUser = session.user

// ── Leer ID del producto desde la URL ────────────────────
const params = new URLSearchParams(window.location.search)
const productId = params.get('id')

let producto = null
let vendedor = null

if (!productId) {
  document.querySelector('.page-wrap').innerHTML = `
    <div class="not-found">
      <div class="icon">📭</div>
      <p>No se especificó ningún producto.</p>
      <a href="home.html" style="color:var(--green-light);font-weight:700;margin-top:16px;display:inline-block;">← Volver al inicio</a>
    </div>`
} else {
  await cargarProducto()
}

async function cargarProducto() {
  const { data, error } = await supabase
    .from('products')
    .select('*, users(id, nombre, username, correo, whatsapp, avatar_url)')
    .eq('id', productId)
    .single()

  if (error || !data) {
    document.querySelector('.page-wrap').innerHTML = `
      <div class="not-found">
        <div class="icon">🔍</div>
        <p>Producto no encontrado.</p>
        <a href="home.html" style="color:var(--green-light);font-weight:700;margin-top:16px;display:inline-block;">← Volver al inicio</a>
      </div>`
    return
  }

  producto = data
  vendedor = data.users

  // Incrementar vistas
  await supabase.from('products').update({ vistas: (data.vistas || 0) + 1 }).eq('id', productId)

  renderProducto()
  renderVendedor()
  await cargarRelacionados()
}

function renderProducto() {
  const catEmojis = { tecnologia:'💻', ropa:'👕', libros:'📚', deportes:'⚽', hogar:'🏠', musica:'🎵', juegos:'🎮', otros:'📦' }
  const emoji = catEmojis[producto.categoria] || '📦'

  document.title = producto.nombre + ' | Yo Lo Vendo'
  document.getElementById('productTitle').textContent = producto.nombre
  document.getElementById('productDesc').textContent  = producto.descripcion || 'Sin descripción.'
  document.getElementById('detEstado').textContent    = '✅ ' + (producto.estado || 'Activo')
  document.getElementById('detCategoria').textContent = emoji + ' ' + (producto.categoria || '—')

  const fecha = new Date(producto.created_at)
  const hoy   = new Date()
  const diff  = Math.floor((hoy - fecha) / 86400000)
  const fechaTxt = diff === 0 ? '🕐 Hoy' : diff === 1 ? '🕐 Ayer' : `🕐 Hace ${diff} días`
  document.getElementById('detFecha').textContent = fechaTxt
  document.getElementById('productCategory').textContent = emoji + ' ' + (producto.categoria || '') + ' · ' + (diff === 0 ? 'Publicado hoy' : fechaTxt.replace('🕐 ','Publicado '))
  document.getElementById('viewsBadge').textContent = '👁 ' + ((producto.vistas || 0) + 1) + ' vistas'

  // Imagen
  if (producto.foto_url) {
    const img = document.getElementById('productImg')
    img.src = producto.foto_url
    img.style.display = 'block'
    document.getElementById('productEmoji').style.display = 'none'

    // Thumbnail con foto real
    const thumbWrap = document.getElementById('galleryThumbs')
    const thumb = document.createElement('div')
    thumb.className = 'thumb active'
    thumb.innerHTML = `<img src="${producto.foto_url}">`
    thumbWrap.appendChild(thumb)
  } else {
    document.getElementById('productEmoji').textContent = emoji
    const thumbWrap = document.getElementById('galleryThumbs')
    const thumb = document.createElement('div')
    thumb.className = 'thumb active'
    thumb.textContent = emoji
    thumbWrap.appendChild(thumb)
  }

  // Tipo y precio
  const badge = document.getElementById('badgeTipo')
  if (producto.tipo === 'venta') {
    badge.textContent = '💰 Venta'
    badge.className = 'badge-tipo badge-venta'
    document.getElementById('productPrice').textContent = '$' + (producto.precio || 0).toLocaleString('es-CO')
    document.getElementById('productPrice').className = 'product-price'
    document.getElementById('detTipo').textContent = '💰 Venta'
  } else {
    badge.textContent = '🔄 Trueque'
    badge.className = 'badge-tipo badge-trueque'
    document.getElementById('productPrice').textContent = '🔄 Trueque'
    document.getElementById('productPrice').className = 'product-price trueque'
    document.getElementById('detTipo').textContent = '🔄 Trueque'
    if (producto.trueque_desc) {
      document.getElementById('truequeDesc').style.display = 'block'
      document.getElementById('truequeWant').textContent = producto.trueque_desc
    }
  }
}

function renderVendedor() {
  const nombre   = vendedor?.nombre   || 'Vendedor'
  const username = vendedor?.username || ''
  const inicial  = nombre[0]?.toUpperCase() || '?'

  document.getElementById('sellerName').textContent      = nombre
  document.getElementById('modalSellerName').textContent = nombre
  document.getElementById('modalEmail').textContent      = vendedor?.correo || '—'

  // Mostrar @username bajo el nombre
  const subEl = document.getElementById('sellerSub')
  if (subEl) subEl.textContent = username ? '@' + username + ' · INTEP' : 'Estudiante INTEP'

  const avatarEl = document.getElementById('sellerAvatar')
  if (vendedor?.avatar_url) {
    avatarEl.innerHTML = `<img src="${vendedor.avatar_url}" alt="${nombre}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
  } else {
    avatarEl.textContent = inicial
  }

  // Botón ver perfil — solo si no es el mismo usuario
  document.getElementById('btnVerPerfil').onclick = () => {
    if (producto.user_id === currentUser.id) {
      window.location.href = 'profile.html'
    } else {
      window.location.href = `seller-profile.html?id=${producto.user_id}`
    }
  }
}

// Ir directo al chat con este vendedor
window.iniciarChatDirecto = async () => {
  if (!vendedor || producto.user_id === currentUser.id) {
    showToast('❌ No puedes chatear contigo mismo')
    return
  }
  // Crear o encontrar conversación existente
  const { data: existing } = await supabase
    .from('conversations')
    .select('id')
    .or(`and(user_a.eq.${currentUser.id},user_b.eq.${producto.user_id}),and(user_a.eq.${producto.user_id},user_b.eq.${currentUser.id})`)
    .maybeSingle()

  let convId = existing?.id
  if (!convId) {
    const { data: nueva } = await supabase.from('conversations').insert({
      user_a:     currentUser.id,
      user_b:     producto.user_id,
      product_id: producto.id,
      last_msg:   '¿Sigue disponible ' + producto.nombre + '?'
    }).select('id').single()
    convId = nueva?.id

    // Enviar mensaje inicial automático
    if (convId) {
      await supabase.from('messages').insert({
        conversation_id: convId,
        sender_id:       currentUser.id,
        content:         '¡Hola! Vi tu publicación de "' + producto.nombre + '" ¿Sigue disponible?',
        leido:           false
      })
    }
  }

  window.location.href = convId ? `chat.html?conv=${convId}` : 'chat.html'
}

window.irAlChatDirecto = async () => {
  closeContact()
  await iniciarChatDirecto()
}

async function cargarRelacionados() {
  const { data } = await supabase
    .from('products')
    .select('id, nombre, precio, tipo, foto_url, categoria')
    .eq('categoria', producto.categoria)
    .eq('estado', 'activo')
    .neq('id', productId)
    .limit(4)

  const grid = document.getElementById('relatedGrid')
  grid.innerHTML = ''

  if (!data || data.length === 0) {
    grid.innerHTML = '<p style="color:var(--text-muted);font-size:13px;">No hay productos relacionados aún.</p>'
    return
  }

  const catEmojis = { tecnologia:'💻', ropa:'👕', libros:'📚', deportes:'⚽', hogar:'🏠', musica:'🎵', juegos:'🎮', otros:'📦' }

  data.forEach(p => {
    const card = document.createElement('div')
    card.className = 'related-card'
    card.onclick = () => window.location.href = `product-detail.html?id=${p.id}`
    const emoji = catEmojis[p.categoria] || '📦'
    const imgContent = p.foto_url
      ? `<img src="${p.foto_url}" alt="${p.nombre}">`
      : emoji
    card.innerHTML = `
      <div class="related-img">${imgContent}</div>
      <div class="related-body">
        <div class="related-name">${p.nombre}</div>
        <div class="related-price ${p.tipo==='trueque'?'t':''}">
          ${p.tipo==='venta' ? '$'+p.precio.toLocaleString('es-CO') : '🔄 Trueque'}
        </div>
      </div>`
    grid.appendChild(card)
  })
}

// ── Favorito ──────────────────────────────────────────────
let isFav = false
window.toggleFav = function() {
  isFav = !isFav
  document.getElementById('favBtn').textContent = isFav ? '❤️' : '🤍'
  showToast(isFav ? '❤️ Guardado en favoritos' : '🤍 Eliminado de favoritos')
}

// ── Contacto ──────────────────────────────────────────────
window.openContact  = () => document.getElementById('contactModal').classList.add('open')
window.closeContact = () => document.getElementById('contactModal').classList.remove('open')
window.handleModalClick = (e) => { if (e.target.id === 'contactModal') closeContact() }

window.contactWA = () => {
  const wa = vendedor?.whatsapp
  if (!wa) { showToast('❌ El vendedor no tiene WhatsApp registrado'); return }
  const msg = encodeURIComponent(`Hola! Vi tu publicación de "${producto?.nombre}" en Yo Lo Vendo. ¿Sigue disponible?`)
  window.open(`https://wa.me/${wa.replace(/\D/g,'')}?text=${msg}`, '_blank')
  closeContact()
}

window.contactEmail = () => {
  const email = vendedor?.correo
  if (!email) { showToast('❌ No se encontró el correo del vendedor'); return }
  const subject = encodeURIComponent(`Interés en: ${producto?.nombre} - Yo Lo Vendo`)
  const body    = encodeURIComponent(`Hola, vi tu publicación de "${producto?.nombre}" en Yo Lo Vendo. ¿Sigue disponible?`)
  window.open(`mailto:${email}?subject=${subject}&body=${body}`)
  closeContact()
}

// ── Compartir ─────────────────────────────────────────────
window.shareProduct = () => {
  const url = window.location.href
  if (navigator.share) {
    navigator.share({ title: producto?.nombre + ' | Yo Lo Vendo', url })
  } else {
    navigator.clipboard.writeText(url)
    showToast('🔗 Enlace copiado')
  }
}

// ── Toast ─────────────────────────────────────────────────
window.showToast = function(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 3000)
}
</script>
