<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chats | Yo Lo Vendo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root{--green-dark:#0b3d2e;--green-mid:#1fbf75;--green-light:#34d399;--yellow:#e6d44c;--yellow-dark:#7a6a00;--card-bg:rgba(255,255,255,0.06);--card-border:rgba(52,211,153,0.2);--text-main:#eafff5;--text-muted:#9fffd8}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;background:radial-gradient(ellipse at top left,#1a5c3a,#0b3d2e 50%,#071f17);min-height:100vh;color:var(--text-main);display:flex;flex-direction:column}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}

    nav{position:sticky;top:0;z-index:100;background:rgba(11,61,46,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--card-border);padding:0 24px;height:64px;display:flex;align-items:center;gap:16px;flex-shrink:0}
    .nav-logo{font-family:'Poppins',sans-serif;font-size:22px;font-weight:900;text-decoration:none}
    .nav-logo .yo{color:#fff}.nav-logo .lo{color:#fff;font-weight:400}.nav-logo .vendo{color:var(--yellow);text-shadow:0 2px 0 var(--yellow-dark)}
    .nav-title{font-family:'Poppins',sans-serif;font-size:16px;font-weight:800;margin-left:8px}
    .nav-back{margin-left:auto;background:rgba(255,255,255,0.08);border:1px solid var(--card-border);color:var(--text-muted);padding:8px 16px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px;transition:all .2s}
    .nav-back:hover{border-color:var(--green-light);color:var(--green-light)}

    .chat-layout{display:flex;flex:1;height:calc(100vh - 64px);overflow:hidden}

    /* LISTA */
    .chat-list{width:320px;flex-shrink:0;border-right:1px solid var(--card-border);display:flex;flex-direction:column;overflow:hidden}
    .chat-list-header{padding:16px 20px;border-bottom:1px solid var(--card-border);font-family:'Poppins',sans-serif;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
    .chat-search{padding:12px 16px;border-bottom:1px solid var(--card-border);position:relative}
    .chat-search input{width:100%;padding:9px 14px 9px 36px;border-radius:50px;border:1.5px solid var(--card-border);background:rgba(255,255,255,.06);color:var(--text-main);font-family:'Nunito',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
    .chat-search input:focus{border-color:var(--green-light)}
    .chat-search input::placeholder{color:var(--text-muted)}
    .chat-search .sicon{position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.5}
    .chat-items{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--card-border) transparent}

    .chat-item{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;border-bottom:1px solid rgba(52,211,153,.07);transition:background .2s;animation:fadeUp .3s ease both}
    .chat-item:hover{background:rgba(255,255,255,.04)}
    .chat-item.active{background:rgba(52,211,153,.1);border-left:3px solid var(--green-light)}
    .chat-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--green-light),var(--yellow));display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-size:18px;font-weight:900;color:#063521;flex-shrink:0;position:relative;overflow:hidden}
    .chat-avatar img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%}
    .online-dot{position:absolute;bottom:2px;right:2px;width:11px;height:11px;border-radius:50%;background:var(--green-light);border:2px solid #0b3d2e;z-index:1}
    .chat-item-info{flex:1;min-width:0}
    .chat-item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
    .chat-item-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
    .chat-item-time{font-size:11px;color:var(--text-muted);flex-shrink:0}
    .chat-item-preview{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .chat-item-product{font-size:11px;color:var(--green-light);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .unread-badge{background:var(--green-mid);color:#063521;font-size:11px;font-weight:800;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}

    /* EMPTY LIST */
    .empty-list{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--text-muted);text-align:center;flex:1}
    .empty-list .icon{font-size:48px;margin-bottom:14px}
    .empty-list p{font-size:14px;line-height:1.6}

    /* VENTANA CHAT */
    .chat-window{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .chat-window-header{padding:14px 24px;border-bottom:1px solid var(--card-border);display:flex;align-items:center;gap:14px;background:rgba(11,61,46,.5);flex-shrink:0}
    .chat-window-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--green-light),var(--yellow));display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-size:17px;font-weight:900;color:#063521;overflow:hidden;flex-shrink:0}
    .chat-window-avatar img{width:100%;height:100%;object-fit:cover}
    .chat-window-info{flex:1}
    .chat-window-name{font-family:'Poppins',sans-serif;font-size:15px;font-weight:800;cursor:pointer}
    .chat-window-name:hover{color:var(--green-light)}
    .chat-window-status{font-size:12px;color:var(--text-muted);margin-top:1px}
    .chat-product-chip{background:rgba(52,211,153,.1);border:1px solid var(--card-border);border-radius:50px;padding:6px 14px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;cursor:pointer;transition:border-color .2s;white-space:nowrap;flex-shrink:0}
    .chat-product-chip:hover{border-color:var(--green-light)}

    /* MENSAJES */
    .messages-wrap{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:var(--card-border) transparent}
    .msg-date-label{text-align:center;font-size:11px;color:var(--text-muted);margin:6px 0;background:rgba(11,61,46,.6);padding:4px 12px;border-radius:50px;align-self:center}
    .msg-row{display:flex;gap:8px;animation:fadeUp .2s ease both}
    .msg-row.mine{flex-direction:row-reverse}
    .msg-avatar-sm{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--green-light),var(--yellow));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#063521;flex-shrink:0;align-self:flex-end;overflow:hidden}
    .msg-avatar-sm img{width:100%;height:100%;object-fit:cover}
    .msg-row.mine .msg-avatar-sm{background:linear-gradient(135deg,#2a7a56,#1fbf75)}
    .msg-bubble{max-width:65%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word}
    .msg-row:not(.mine) .msg-bubble{background:var(--card-bg);border:1px solid var(--card-border);border-bottom-left-radius:4px}
    .msg-row.mine .msg-bubble{background:linear-gradient(135deg,#1a6644,#145233);border:1px solid rgba(52,211,153,.3);border-bottom-right-radius:4px}
    .msg-time{font-size:10px;color:var(--text-muted);margin-top:4px}
    .msg-row.mine .msg-time{text-align:right}
    .msg-row:not(.mine) .msg-time{text-align:left}
    .msg-status{font-size:10px;color:var(--green-light);margin-left:4px}

    /* INPUT */
    .chat-input-bar{padding:14px 24px;border-top:1px solid var(--card-border);display:flex;gap:10px;align-items:flex-end;background:rgba(11,61,46,.5);flex-shrink:0}
    .chat-input-bar textarea{flex:1;padding:11px 16px;border-radius:20px;border:1.5px solid var(--card-border);background:rgba(255,255,255,.07);color:var(--text-main);font-family:'Nunito',sans-serif;font-size:14px;outline:none;resize:none;max-height:100px;transition:border-color .2s;line-height:1.4}
    .chat-input-bar textarea:focus{border-color:var(--green-light)}
    .chat-input-bar textarea::placeholder{color:var(--text-muted)}
    .btn-send{width:46px;height:46px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--green-light),var(--green-mid));color:#063521;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s;flex-shrink:0}
    .btn-send:hover{transform:scale(1.1);box-shadow:0 4px 16px rgba(52,211,153,.4)}
    .btn-send:disabled{opacity:.5;cursor:not-allowed;transform:none}

    /* EMPTY CHAT */
    .empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);text-align:center;padding:40px}
    .empty-chat .big{font-size:64px;margin-bottom:16px}
    .empty-chat h3{font-family:'Poppins',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text-main)}
    .empty-chat p{font-size:14px}

    /* LOADING */
    .spin-sm{width:18px;height:18px;border:2px solid var(--text-muted);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

    /* BOTTOM NAV (solo móvil) */
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(11,61,46,0.97);border-top:1px solid var(--card-border);backdrop-filter:blur(14px);padding:10px 0 18px;z-index:100}
    .bnav-inner{display:flex;justify-content:space-around}
    .bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--text-muted);font-size:11px;font-weight:600;text-decoration:none;transition:color .2s}
    .bnav-item.active{color:var(--green-light)}
    .bnav-icon{font-size:22px}
    .bnav-publish{background:linear-gradient(135deg,var(--green-light),var(--green-mid));color:#063521!important;padding:10px 22px;border-radius:50px;margin-top:-18px;box-shadow:0 4px 20px rgba(52,211,153,.5)}

    /* MÓVIL */
    @media(max-width:640px){
      .chat-list{width:100%;border-right:none}
      .chat-window{display:none}
      .chat-window.mobile-open{display:flex;position:fixed;inset:0;z-index:50;background:#071f17}
      .bottom-nav{display:block}
      .chat-layout{height:calc(100vh - 64px - 72px)}
      .mobile-back{display:flex!important}
    }
    .mobile-back{display:none;background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;padding:4px}

    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green-mid);color:#063521;font-weight:700;font-size:14px;padding:12px 24px;border-radius:50px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<nav>
  <a href="home.html" class="nav-logo"><span class="yo">YO</span><span class="lo">lo</span><span class="vendo">VENDO</span></a>
  <span class="nav-title">💬 Chats</span>
  <a href="home.html" class="nav-back">← Inicio</a>
</nav>

<div class="chat-layout">

  <!-- LISTA DE CONVERSACIONES -->
  <div class="chat-list" id="chatList">
    <div class="chat-list-header">
      Conversaciones
      <span id="unreadTotal" style="background:var(--green-mid);color:#063521;font-size:11px;font-weight:800;padding:2px 8px;border-radius:50px;display:none"></span>
    </div>
    <div class="chat-search">
      <span class="sicon">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar conversación..." oninput="filtrarConvs(this.value)">
    </div>
    <div class="chat-items" id="chatItems">
      <div class="empty-list"><div class="spin-sm"></div></div>
    </div>
  </div>

  <!-- VENTANA DE CHAT -->
  <div class="chat-window" id="chatWindow">
    <div class="empty-chat">
      <div class="big">💬</div>
      <h3>Selecciona una conversación</h3>
      <p>Elige un chat de la lista para empezar a hablar.<br>Los mensajes se guardan en tiempo real.</p>
    </div>
  </div>

</div>

<div class="bottom-nav">
  <div class="bnav-inner">
    <a href="home.html"    class="bnav-item"><span class="bnav-icon">🏠</span><span>Inicio</span></a>
    <a href="search.html"  class="bnav-item"><span class="bnav-icon">🔍</span><span>Buscar</span></a>
    <a href="home.html"    class="bnav-item bnav-publish"><span class="bnav-icon">＋</span><span>Publicar</span></a>
    <a href="chat.html"    class="bnav-item active"><span class="bnav-icon">💬</span><span>Chats</span></a>
    <a href="profile.html" class="bnav-item"><span class="bnav-icon">👤</span><span>Perfil</span></a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const supabase = createClient(
  'https://uvkjerejhhbpgyvpmxur.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2a2plcmVqaGhicGd5dnBteHVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTA0ODEsImV4cCI6MjA5MDQyNjQ4MX0.bWQEBRsrxeEdtMRAyOfTZsGKI526Ig629APP21saUVI'
)

const { data:{ session } } = await supabase.auth.getSession()
if (!session) { window.location.href = 'index.html' }
const ME = session.user

// Cargar perfil propio para el avatar
let miPerfil = null
const { data: mp } = await supabase.from('users').select('nombre,avatar_url,username').eq('id', ME.id).single()
miPerfil = mp || { nombre: ME.email, avatar_url: null }

// ── ESTADO ─────────────────────────────────────────────────
let todasConvs   = []       // lista completa de convs
let convActual   = null     // conv abierta
let msgSub       = null     // suscripción realtime mensajes
let convSub      = null     // suscripción realtime convs
const convCache  = {}       // { convId: [messages] }

// ── HELPERS ───────────────────────────────────────────────
const fmtHora  = iso => new Date(iso).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})
const fmtFecha = iso => {
  const d = new Date(iso), hoy = new Date()
  if (d.toDateString() === hoy.toDateString()) return 'Hoy'
  const ayer = new Date(hoy); ayer.setDate(hoy.getDate()-1)
  if (d.toDateString() === ayer.toDateString()) return 'Ayer'
  return d.toLocaleDateString('es-CO',{day:'numeric',month:'short'})
}
const avatarHtml = (url, letra, size=46) =>
  url
  ? `<img src="${url}" alt="" style="width:${size}px;height:${size}px;object-fit:cover;border-radius:50%;position:absolute;inset:0">`
  : `<span style="font-size:${Math.round(size*.4)}px">${letra}</span>`

function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 3000)
}

// ── CARGAR CONVERSACIONES ──────────────────────────────────
async function cargarConvs() {
  const { data, error } = await supabase
    .from('conversations')
    .select(`
      id, last_msg, last_at,
      user_a, user_b,
      product_id,
      ua:users!conversations_user_a_fkey(id,nombre,username,avatar_url),
      ub:users!conversations_user_b_fkey(id,nombre,username,avatar_url),
      products(nombre,tipo)
    `)
    .or(`user_a.eq.${ME.id},user_b.eq.${ME.id}`)
    .order('last_at', { ascending: false })

  if (error) { console.error(error); return }

  // Para cada conv contar mensajes no leídos
  const ids = (data||[]).map(c => c.id)
  let unreadMap = {}
  if (ids.length) {
    const { data: unreadData } = await supabase
      .from('messages')
      .select('conversation_id')
      .in('conversation_id', ids)
      .eq('leido', false)
      .neq('sender_id', ME.id)
    ;(unreadData||[]).forEach(m => {
      unreadMap[m.conversation_id] = (unreadMap[m.conversation_id]||0)+1
    })
  }

  todasConvs = (data||[]).map(c => {
    const otro = c.user_a === ME.id ? c.ub : c.ua
    return { ...c, otro, unread: unreadMap[c.id]||0 }
  })

  renderConvList(todasConvs)
  actualizarTotalNoLeidos()
}

// ── RENDERIZAR LISTA ───────────────────────────────────────
function renderConvList(lista) {
  const c = document.getElementById('chatItems')
  c.innerHTML = ''

  if (!lista.length) {
    c.innerHTML = `<div class="empty-list"><div class="icon">💬</div><p>No tienes chats aún.<br>Contáctate desde la página de un producto.</p></div>`
    return
  }

  lista.forEach((conv, i) => {
    const otro    = conv.otro
    const nombre  = otro?.nombre || otro?.username || 'Usuario'
    const letra   = nombre[0]?.toUpperCase() || '?'
    const preview = conv.last_msg ? conv.last_msg.substring(0,50) : 'Conversación nueva'
    const hora    = conv.last_at ? fmtFecha(conv.last_at) : ''
    const prod    = conv.products?.nombre || ''
    const isActive = convActual?.id === conv.id

    const div = document.createElement('div')
    div.className = 'chat-item' + (isActive ? ' active' : '')
    div.style.animationDelay = `${i*.04}s`
    div.onclick = () => abrirConv(conv.id)
    div.innerHTML = `
      <div class="chat-avatar" style="position:relative">
        ${otro?.avatar_url ? `<img src="${otro.avatar_url}" alt="">` : letra}
      </div>
      <div class="chat-item-info">
        <div class="chat-item-top">
          <span class="chat-item-name">${nombre}</span>
          <span class="chat-item-time">${hora}</span>
        </div>
        <div class="chat-item-preview">${preview}</div>
        ${prod ? `<div class="chat-item-product">📦 ${prod}</div>` : ''}
      </div>
      ${conv.unread > 0 ? `<div class="unread-badge">${conv.unread}</div>` : ''}`
    c.appendChild(div)
  })
}

function actualizarTotalNoLeidos() {
  const total = todasConvs.reduce((a,c)=>a+c.unread, 0)
  const badge = document.getElementById('unreadTotal')
  if (total > 0) { badge.textContent = total; badge.style.display = 'inline' }
  else           { badge.style.display = 'none' }
}

// ── ABRIR CONVERSACIÓN ─────────────────────────────────────
async function abrirConv(convId) {
  convActual = todasConvs.find(c => c.id === convId)
  if (!convActual) return

  // Marcar como leídos en Supabase
  await supabase.from('messages')
    .update({ leido: true })
    .eq('conversation_id', convId)
    .neq('sender_id', ME.id)

  convActual.unread = 0
  renderConvList(todasConvs)
  actualizarTotalNoLeidos()

  // Cancelar suscripción anterior
  if (msgSub) supabase.removeChannel(msgSub)

  const otro   = convActual.otro
  const nombre = otro?.nombre || otro?.username || 'Usuario'
  const letra  = nombre[0]?.toUpperCase() || '?'
  const prod   = convActual.products?.nombre || ''

  // Construir ventana
  const win = document.getElementById('chatWindow')
  win.classList.add('mobile-open')
  win.innerHTML = `
    <div class="chat-window-header">
      <button class="mobile-back" onclick="cerrarMobile()">←</button>
      <div class="chat-window-avatar" style="position:relative">
        ${otro?.avatar_url ? `<img src="${otro.avatar_url}" alt="">` : letra}
      </div>
      <div class="chat-window-info">
        <div class="chat-window-name" onclick="irPerfilOtro()">${nombre}</div>
        <div class="chat-window-status" id="winStatus">● Activo recientemente</div>
      </div>
      ${prod ? `<div class="chat-product-chip" onclick="irProducto()">📦 ${prod} ↗</div>` : ''}
    </div>
    <div class="messages-wrap" id="messagesWrap"></div>
    <div class="chat-input-bar">
      <textarea id="msgInput" placeholder="Escribe un mensaje..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="btnSend" onclick="enviarMensaje()">➤</button>
    </div>`

  // Cargar mensajes
  await cargarMensajes(convId)

  // Realtime: escuchar nuevos mensajes de esta conv
  msgSub = supabase
    .channel(`msgs-${convId}`)
    .on('postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'messages', filter: `conversation_id=eq.${convId}` },
      payload => {
        const msg = payload.new
        if (msg.sender_id !== ME.id) {
          agregarMensajeDOM(msg, false)
          // Marcar como leído
          supabase.from('messages').update({leido:true}).eq('id', msg.id)
        }
      }
    )
    .subscribe()
}

async function cargarMensajes(convId) {
  const wrap = document.getElementById('messagesWrap')
  if (!wrap) return
  wrap.innerHTML = `<div style="display:flex;justify-content:center;padding:20px"><div class="spin-sm"></div></div>`

  const { data, error } = await supabase
    .from('messages')
    .select('id,content,sender_id,leido,created_at')
    .eq('conversation_id', convId)
    .order('created_at', { ascending: true })
    .limit(100)

  if (error) { wrap.innerHTML = `<div style="text-align:center;color:var(--text-muted);padding:20px">❌ Error cargando mensajes</div>`; return }

  wrap.innerHTML = ''
  convCache[convId] = data || []

  // Agrupar por fecha
  let fechaActual = ''
  ;(data||[]).forEach(msg => {
    const fecha = fmtFecha(msg.created_at)
    if (fecha !== fechaActual) {
      fechaActual = fecha
      const lbl = document.createElement('div')
      lbl.className = 'msg-date-label'; lbl.textContent = fecha
      wrap.appendChild(lbl)
    }
    agregarMensajeDOM(msg, true)
  })

  scrollBottom()
}

function agregarMensajeDOM(msg, enBatch = false) {
  const wrap = document.getElementById('messagesWrap')
  if (!wrap) return

  const esMio  = msg.sender_id === ME.id
  const letra  = esMio
    ? (miPerfil.nombre||'?')[0].toUpperCase()
    : (convActual?.otro?.nombre||'?')[0].toUpperCase()
  const avatarUrl = esMio ? miPerfil.avatar_url : convActual?.otro?.avatar_url

  const avatarHtmlStr = avatarUrl
    ? `<img src="${avatarUrl}" alt="" style="width:30px;height:30px;object-fit:cover;border-radius:50%;position:absolute;inset:0">`
    : letra

  const row = document.createElement('div')
  row.className = 'msg-row' + (esMio ? ' mine' : '')
  row.dataset.msgId = msg.id
  row.innerHTML = `
    <div class="msg-avatar-sm" style="position:relative">${avatarHtmlStr}</div>
    <div>
      <div class="msg-bubble">${escapeHtml(msg.content)}</div>
      <div class="msg-time">${fmtHora(msg.created_at)}${esMio&&msg.leido?'<span class="msg-status">✓✓</span>':''}</div>
    </div>`
  wrap.appendChild(row)
  if (!enBatch) scrollBottom()
}

function escapeHtml(txt) {
  return txt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')
}

async function enviarMensaje() {
  const input = document.getElementById('msgInput')
  if (!input) return
  const texto = input.value.trim()
  if (!texto || !convActual) return

  const btn = document.getElementById('btnSend')
  btn.disabled = true

  const { data: msg, error } = await supabase.from('messages').insert({
    conversation_id: convActual.id,
    sender_id:       ME.id,
    content:         texto,
    leido:           false,
  }).select().single()

  btn.disabled = false

  if (error) { showToast('❌ Error enviando mensaje'); return }

  // Actualizar last_msg en conversation
  await supabase.from('conversations')
    .update({ last_msg: texto, last_at: new Date().toISOString() })
    .eq('id', convActual.id)

  // Mostrar en DOM
  agregarMensajeDOM(msg, false)
  input.value = ''; input.style.height = 'auto'

  // Actualizar lista
  convActual.last_msg = texto
  convActual.last_at  = msg.created_at
  renderConvList(todasConvs)
}

function scrollBottom() {
  const w = document.getElementById('messagesWrap')
  if (w) w.scrollTop = w.scrollHeight
}

window.handleKey = e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensaje() }
}
window.autoResize = el => {
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 100) + 'px'
}
window.cerrarMobile = () => document.getElementById('chatWindow').classList.remove('mobile-open')
window.irPerfilOtro = () => {
  if (convActual?.otro?.id) window.location.href = `seller-profile.html?id=${convActual.otro.id}`
}
window.irProducto = () => {
  if (convActual?.product_id) window.location.href = `product-detail.html?id=${convActual.product_id}`
}

// ── FILTRAR LISTA ──────────────────────────────────────────
window.filtrarConvs = q => {
  const busq = q.toLowerCase()
  const filtrado = busq
    ? todasConvs.filter(c => (c.otro?.nombre||'').toLowerCase().includes(busq) || (c.products?.nombre||'').toLowerCase().includes(busq))
    : todasConvs
  renderConvList(filtrado)
}

// ── REALTIME: nuevas convs o actualizaciones ───────────────
convSub = supabase
  .channel('convs-realtime')
  .on('postgres_changes',
    { event: '*', schema: 'public', table: 'conversations' },
    () => cargarConvs()
  )
  .subscribe()

// ── DESDE URL: abrir conv directa ─────────────────────────
const params  = new URLSearchParams(window.location.search)
const convUrl = params.get('conv')

// ── CREAR/ABRIR CONV con otro usuario (llamado desde product-detail) ──
window.iniciarChat = async (otroUserId, productId) => {
  // Buscar conv existente
  let convId = null
  const { data: existing } = await supabase
    .from('conversations')
    .select('id')
    .or(`and(user_a.eq.${ME.id},user_b.eq.${otroUserId}),and(user_a.eq.${otroUserId},user_b.eq.${ME.id})`)
    .single()

  if (existing) {
    convId = existing.id
  } else {
    const { data: nueva } = await supabase.from('conversations').insert({
      user_a: ME.id,
      user_b: otroUserId,
      product_id: productId || null,
    }).select('id').single()
    convId = nueva?.id
  }

  if (convId) {
    await cargarConvs()
    await abrirConv(convId)
  }
}

// ── INIT ──────────────────────────────────────────────────
await cargarConvs()
if (convUrl) {
  await abrirConv(convUrl)
}
</script>
