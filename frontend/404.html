<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Página no encontrada | Yo Lo Vendo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root { --green-mid:#1fbf75;--green-light:#34d399;--yellow:#e6d44c;--yellow-dark:#7a6a00;--card-bg:rgba(255,255,255,0.06);--card-border:rgba(52,211,153,0.2);--text-main:#eafff5;--text-muted:#9fffd8; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;background:radial-gradient(ellipse at top left,#1a5c3a,#0b3d2e 50%,#071f17);min-height:100vh;color:var(--text-main);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .emoji-big{font-size:100px;animation:float 3s ease-in-out infinite;margin-bottom:24px}
    .num-404{font-family:'Poppins',sans-serif;font-size:96px;font-weight:900;line-height:1;background:linear-gradient(135deg,var(--green-light),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px;animation:fadeUp 0.4s ease both}
    h1{font-family:'Poppins',sans-serif;font-size:24px;font-weight:800;margin-bottom:12px;animation:fadeUp 0.5s ease both}
    p{font-size:15px;color:var(--text-muted);margin-bottom:32px;max-width:360px;line-height:1.6;animation:fadeUp 0.6s ease both}
    .btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;animation:fadeUp 0.7s ease both}
    .btn-home{background:linear-gradient(135deg,var(--green-light),var(--green-mid));color:#063521;font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;padding:13px 28px;border-radius:50px;border:none;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s}
    .btn-home:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(52,211,153,0.4)}
    .btn-back{background:rgba(255,255,255,0.08);border:1.5px solid var(--card-border);color:var(--text-muted);font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;padding:13px 28px;border-radius:50px;cursor:pointer;transition:border-color 0.2s}
    .btn-back:hover{border-color:var(--green-light);color:var(--green-light)}
    .quick-links{margin-top:40px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;animation:fadeUp 0.8s ease both}
    .quick-link{background:var(--card-bg);border:1px solid var(--card-border);padding:10px 18px;border-radius:50px;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;text-decoration:none;transition:all 0.2s}
    .quick-link:hover{border-color:var(--green-light);color:var(--green-light)}
  </style>
</head>
<body>
  <div class="emoji-big">🤖</div>
  <div class="num-404">404</div>
  <h1>¡Ups! Página no encontrada</h1>
  <p>Parece que esta página no existe o fue eliminada. Pero tranquilo, en Yo Lo Vendo siempre hay algo interesante esperándote.</p>
  <div class="btns">
    <button class="btn-home" onclick="window.location.href='home.html'">🏠 Ir al inicio</button>
    <button class="btn-back" onclick="history.back()">← Volver atrás</button>
  </div>
  <div class="quick-links">
    <a href="search.html" class="quick-link">🔍 Buscar</a>
    <a href="favorites.html" class="quick-link">❤️ Favoritos</a>
    <a href="profile.html" class="quick-link">👤 Mi perfil</a>
    <a href="help.html" class="quick-link">🆘 Ayuda</a>
  </div>
</body>
</html>
